name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt into Node.js 24 runtime for all actions (removes Node20 deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce pnpm-only lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json detected. This repo uses pnpm only."
            exit 1
          fi

      - name: "🔐 Validate critical secrets for E2E release tests"
        run: |
          if [ "${{ vars.ENABLE_E2E }}" = "true" ]; then
            if [ -z "${{ secrets.PLAYWRIGHT_LOGIN_EMAIL }}" ]; then
              echo "::error::CRITICAL: PLAYWRIGHT_LOGIN_EMAIL secret is required for E2E release validation."
              echo "Add it to: Settings → Secrets and variables → Actions → New repository secret"
              exit 1
            fi
            if [ -z "${{ secrets.PLAYWRIGHT_LOGIN_PASSWORD }}" ]; then
              echo "::error::CRITICAL: PLAYWRIGHT_LOGIN_PASSWORD secret is required for E2E release validation."
              echo "Add it to: Settings → Secrets and variables → Actions → New repository secret"
              exit 1
            fi
            echo "✓ E2E secrets validated: PLAYWRIGHT_LOGIN_EMAIL and PLAYWRIGHT_LOGIN_PASSWORD are set."
          fi

      - name: Scan for hardcoded credentials in E2E tests
        run: |
          echo "Scanning tests/e2e/ for hardcoded email addresses and password literals..."
          if grep -rn --include="*.ts" --include="*.js" \
            -E "@(gmail|yahoo|hotmail|outlook)\.(com|ro)" \
            tests/e2e/ 2>/dev/null; then
            echo "::error::Hardcoded email addresses detected in E2E tests. Use PLAYWRIGHT_LOGIN_EMAIL / PLAYWRIGHT_TEST_CLIENT_EMAIL env vars."
            exit 1
          fi
          if grep -rn --include="*.ts" --include="*.js" \
            -E "(P|p)assword\s*=\s*'[^'\$\{]" \
            tests/e2e/ 2>/dev/null; then
            echo "::error::Hardcoded password literals detected in E2E tests. Use PLAYWRIGHT_LOGIN_PASSWORD env var."
            exit 1
          fi
          echo "Credential scan passed — no hardcoded credentials found."

      - name: Unit tests, types, lint, audit
        run: pnpm run check:all

      - name: Build
        run: pnpm exec next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://ocupaloc.ro

      - name: Install Playwright browser (E2E only)
        if: ${{ vars.ENABLE_E2E == 'true' }}
        run: pnpm exec playwright install --with-deps chromium

      - name: "🚀 E2E Release Validation (CRITICAL)"
        if: ${{ vars.ENABLE_E2E == 'true' }}
        env:
          PLAYWRIGHT_REQUIRE_EXECUTION: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_BOOKING_SLUG: ${{ vars.PLAYWRIGHT_BOOKING_SLUG }}
          PLAYWRIGHT_ENABLE_DEMO_SMOKE: ${{ vars.PLAYWRIGHT_ENABLE_DEMO_SMOKE }}
          PLAYWRIGHT_LOGIN_EMAIL: ${{ secrets.PLAYWRIGHT_LOGIN_EMAIL }}
          PLAYWRIGHT_LOGIN_PASSWORD: ${{ secrets.PLAYWRIGHT_LOGIN_PASSWORD }}
        run: |
          echo "Running E2E release validation with CRITICAL test enforcing required secrets..."
          pnpm run test:e2e

