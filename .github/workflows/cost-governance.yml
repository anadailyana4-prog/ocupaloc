name: Auto Cost Governance

on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cost-check:
    name: Cost Governance Check
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create cost-alert --color f59e0b --description "Cost spike or anomaly"   --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create cost-info  --color fde68a --description "Weekly cost governance"  --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Collect DB usage proxy metrics (7d vs 14d)
        id: db_usage
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SINCE_7D=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          SINCE_14D=$(date -u -d "14 days ago" +"%Y-%m-%dT%H:%M:%SZ")

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "count_7d=0"  >> "$GITHUB_OUTPUT"
            echo "count_14d=0" >> "$GITHUB_OUTPUT"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT_7D=$(curl -sf \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Prefer: count=exact" \
            "$SUPABASE_URL/rest/v1/operational_events?select=id&created_at=gte.${SINCE_7D}&limit=1" \
            -I 2>/dev/null \
            | grep -i "content-range" | awk -F'/' '{print $2}' | tr -d '[:space:]' || echo "0")

          COUNT_14D=$(curl -sf \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Prefer: count=exact" \
            "$SUPABASE_URL/rest/v1/operational_events?select=id&created_at=gte.${SINCE_14D}&limit=1" \
            -I 2>/dev/null \
            | grep -i "content-range" | awk -F'/' '{print $2}' | tr -d '[:space:]' || echo "0")

          if [ -z "$COUNT_7D" ] || [ "$COUNT_7D" = "*" ]; then COUNT_7D="0"; fi
          if [ -z "$COUNT_14D" ] || [ "$COUNT_14D" = "*" ]; then COUNT_14D="0"; fi

          # Prev 7d = 14d total - 7d total
          PREV_7D=$(( COUNT_14D - COUNT_7D ))
          if [ "$PREV_7D" -lt 0 ]; then PREV_7D="0"; fi

          echo "count_7d=$COUNT_7D"   >> "$GITHUB_OUTPUT"
          echo "prev_7d=$PREV_7D"     >> "$GITHUB_OUTPUT"
          echo "skipped=false"        >> "$GITHUB_OUTPUT"

      - name: Collect API request proxy (CI runs, last 7d)
        id: ci_usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          RUNS=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100&created=>=$SINCE" \
            || echo '{"total_count":0}')

          TOTAL=$(echo "$RUNS" | jq '.total_count // 0')
          BILLABLE_MINS=$(echo "$RUNS" | jq '[.workflow_runs[]?.run_duration_ms // 0] | add // 0')
          BILLABLE_SECS=$(awk -v ms="$BILLABLE_MINS" 'BEGIN{printf "%d", ms/1000}')

          echo "ci_runs=$TOTAL"       >> "$GITHUB_OUTPUT"
          echo "ci_secs=$BILLABLE_SECS" >> "$GITHUB_OUTPUT"

      - name: Probe production endpoint latency cost indicator
        id: latency
        run: |
          TOTAL_MS=0
          COUNT=0
          for i in 1 2 3; do
            START=$(date +%s%3N)
            curl -s -o /dev/null --max-time 15 "https://ocupaloc.ro/api/health" || true
            END=$(date +%s%3N)
            MS=$(( END - START ))
            TOTAL_MS=$(( TOTAL_MS + MS ))
            COUNT=$(( COUNT + 1 ))
          done
          AVG_MS=$(awk -v t="$TOTAL_MS" -v c="$COUNT" 'BEGIN{printf "%d", t/c}')
          echo "avg_ms=$AVG_MS" >> "$GITHUB_OUTPUT"

      - name: Evaluate cost anomalies
        id: eval
        run: |
          COUNT_7D="${{ steps.db_usage.outputs.count_7d }}"
          PREV_7D="${{ steps.db_usage.outputs.prev_7d }}"
          CI_RUNS="${{ steps.ci_usage.outputs.ci_runs }}"
          CI_SECS="${{ steps.ci_usage.outputs.ci_secs }}"
          AVG_MS="${{ steps.latency.outputs.avg_ms }}"
          SKIPPED="${{ steps.db_usage.outputs.skipped }}"

          ALERT_LEVEL="ok"
          NOTES=""

          if [ "$SKIPPED" = "false" ] && [ "$PREV_7D" -gt 0 ]; then
            # Spike: current week > previous week * 2 (100% growth = anomalous)
            SPIKE=$(awk -v cur="$COUNT_7D" -v prev="$PREV_7D" 'BEGIN{printf "%.1f", (cur/prev)*100}')
            if awk -v s="$SPIKE" 'BEGIN{exit (s>200)?0:1}'; then
              ALERT_LEVEL="critical"
              NOTES="DB event volume CRITICAL spike: current 7d=${COUNT_7D} vs previous 7d=${PREV_7D} (+${SPIKE}%%)"
            elif awk -v s="$SPIKE" 'BEGIN{exit (s>150)?0:1}'; then
              if [ "$ALERT_LEVEL" = "ok" ]; then ALERT_LEVEL="warn"; fi
              NOTES="DB event volume WARNING: current 7d=${COUNT_7D} vs previous 7d=${PREV_7D} (+${SPIKE}%%)"
            fi
          fi

          # CI minutes anomaly (>50 runs/week is unusual for a small project)
          if awk -v v="$CI_RUNS" 'BEGIN{exit (v>100)?0:1}'; then
            ALERT_LEVEL="critical"
            NOTES="${NOTES}; CI runs CRITICAL: $CI_RUNS runs in 7d (threshold 100)"
          elif awk -v v="$CI_RUNS" 'BEGIN{exit (v>50)?0:1}'; then
            if [ "$ALERT_LEVEL" = "ok" ]; then ALERT_LEVEL="warn"; fi
            NOTES="${NOTES}; CI runs WARNING: $CI_RUNS runs in 7d (threshold 50)"
          fi

          # Latency as cost indicator (very slow = potential DB connection pool exhaustion)
          if awk -v v="$AVG_MS" 'BEGIN{exit (v>3000)?0:1}'; then
            if [ "$ALERT_LEVEL" = "ok" ]; then ALERT_LEVEL="warn"; fi
            NOTES="${NOTES}; High avg API latency ${AVG_MS}ms may indicate resource contention"
          fi

          echo "alert_level=$ALERT_LEVEL" >> "$GITHUB_OUTPUT"
          echo "notes=$NOTES"             >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          LEVEL="${{ steps.eval.outputs.alert_level }}"
          COUNT_7D="${{ steps.db_usage.outputs.count_7d }}"
          PREV_7D="${{ steps.db_usage.outputs.prev_7d }}"
          CI_RUNS="${{ steps.ci_usage.outputs.ci_runs }}"
          CI_SECS="${{ steps.ci_usage.outputs.ci_secs }}"
          AVG_MS="${{ steps.latency.outputs.avg_ms }}"
          NOTES="${{ steps.eval.outputs.notes }}"

          printf "## Cost Governance Report - %s\n\n" "$DATE"                          >> "$GITHUB_STEP_SUMMARY"
          printf "**Status:** %s\n\n"                  "$LEVEL"                         >> "$GITHUB_STEP_SUMMARY"
          printf '### Usage Indicators (7d)\n\n'                                        >> "$GITHUB_STEP_SUMMARY"
          printf -- "- DB operational events (current 7d): %s\n"  "$COUNT_7D"             >> "$GITHUB_STEP_SUMMARY"
          printf -- "- DB operational events (previous 7d): %s\n" "$PREV_7D"              >> "$GITHUB_STEP_SUMMARY"
          printf -- "- GitHub Actions runs (7d): %s\n"            "$CI_RUNS"              >> "$GITHUB_STEP_SUMMARY"
          printf -- "- CI total execution (secs): %s\n"           "$CI_SECS"              >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Avg API health latency: %s ms\n"           "$AVG_MS"               >> "$GITHUB_STEP_SUMMARY"
          printf '\n### Thresholds\n\n'                                                    >> "$GITHUB_STEP_SUMMARY"
          printf -- "- DB volume: warn >150%% WoW, critical >200%% WoW\n"                 >> "$GITHUB_STEP_SUMMARY"
          printf -- "- CI runs: warn >50/wk, critical >100/wk\n"                          >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$NOTES" ]; then
            printf "\n### Anomalies\n\n%s\n" "$NOTES"                                   >> "$GITHUB_STEP_SUMMARY"
          fi
          printf '\n### Optimization Recommendations\n\n'                               >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Archive operational_events older than 90 days\n"                    >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Cache static assets via Cloudflare to reduce Vercel invocations\n"  >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Use ISR for booking service pages to reduce SSR cost\n"             >> "$GITHUB_STEP_SUMMARY"

      - name: Open cost alert issue
        if: steps.eval.outputs.alert_level != 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          LEVEL="${{ steps.eval.outputs.alert_level }}"
          TITLE="[COST-${LEVEL}] Cost anomaly detected - $DATE"
          EXISTS=$(gh issue list --repo "${{ github.repository }}" --state open --label cost-alert \
            --json title -q ".[].title" | grep -F "$TITLE" | head -1)
          if [ -n "$EXISTS" ]; then echo "Deduplicated."; exit 0; fi

          COUNT_7D="${{ steps.db_usage.outputs.count_7d }}"
          PREV_7D="${{ steps.db_usage.outputs.prev_7d }}"
          CI_RUNS="${{ steps.ci_usage.outputs.ci_runs }}"
          CI_SECS="${{ steps.ci_usage.outputs.ci_secs }}"
          NOTES="${{ steps.eval.outputs.notes }}"

          BODY=$(printf "Cost governance alert (%s) on %s.\n\nAnomalies detected:\n%s\n\nUsage summary:\n- DB events current 7d: %s\n- DB events previous 7d: %s\n- CI runs this week: %s\n- CI execution time: %s sec\n\nOptimization actions:\n1. Archive operational_events older than 90d (reduces DB storage)\n2. Review CI trigger conditions for unnecessary runs\n3. Audit third-party API call frequency in booking flow\n4. Enable Next.js ISR for high-traffic static pages\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "$LEVEL" "$DATE" "$NOTES" "$COUNT_7D" "$PREV_7D" "$CI_RUNS" "$CI_SECS")

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "cost-alert"
