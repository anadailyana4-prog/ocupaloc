name: Retention & Churn Intelligence

on:
  schedule:
    - cron: "10 7 * * *"
  workflow_dispatch:

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retention:
    name: Cohort Retention and Churn Risk
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create retention-alert --color 0ea5e9 --description "Retention degradation" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create churn-risk --color e11d48 --description "Accounts at risk of churn" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create growth-intel --color 6366f1 --description "Growth intelligence" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Collect cohorts and account activity
        id: metrics
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SINCE_7=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          SINCE_14=$(date -u -d "14 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          SINCE_30=$(date -u -d "30 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          SINCE_60=$(date -u -d "60 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          SINCE_90=$(date -u -d "90 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          TODAY=$(date -u +"%Y-%m-%d")

          PROFS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/profesionisti?select=id,created_at,onboarding_pas&limit=5000" || echo "[]")

          BOOKS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/programari?select=id,profesionist_id,status,created_at&limit=20000" || echo "[]")

          TOTAL=$(echo "$PROFS" | jq 'length')
          ACTIVE_7=$(echo "$BOOKS" | jq --arg s "$SINCE_7" '[.[] | select(.created_at >= $s) | .profesionist_id] | unique | length')
          ACTIVE_30=$(echo "$BOOKS" | jq --arg s "$SINCE_30" '[.[] | select(.created_at >= $s) | .profesionist_id] | unique | length')
          ACTIVE_60=$(echo "$BOOKS" | jq --arg s "$SINCE_60" '[.[] | select(.created_at >= $s) | .profesionist_id] | unique | length')
          ACTIVE_90=$(echo "$BOOKS" | jq --arg s "$SINCE_90" '[.[] | select(.created_at >= $s) | .profesionist_id] | unique | length')

          RET_7=$(awk -v a="$ACTIVE_7" -v t="$TOTAL" 'BEGIN{if(t==0) print "0.0"; else printf "%.1f", (a*100)/t}')
          RET_30=$(awk -v a="$ACTIVE_30" -v t="$TOTAL" 'BEGIN{if(t==0) print "0.0"; else printf "%.1f", (a*100)/t}')
          RET_60=$(awk -v a="$ACTIVE_60" -v t="$TOTAL" 'BEGIN{if(t==0) print "0.0"; else printf "%.1f", (a*100)/t}')
          RET_90=$(awk -v a="$ACTIVE_90" -v t="$TOTAL" 'BEGIN{if(t==0) print "0.0"; else printf "%.1f", (a*100)/t}')

          AT_RISK=$(jq -n --argjson profs "$PROFS" --argjson books "$BOOKS" --arg s14 "$SINCE_14" '
            [
              $profs[] as $p |
              (
                [ $books[] | select(.profesionist_id == $p.id and .created_at >= $s14) ]
              ) as $recent |
              (
                [ $books[] | select(.profesionist_id == $p.id and .created_at >= $s14 and .status == "anulat") ]
              ) as $cancelled |
              {
                id: $p.id,
                score: ((if ($recent | length) == 0 then 70 else 20 end) + (if ($cancelled | length) >= 2 then 20 else 0 end) + (if (($recent | length) <= 1) then 10 else 0 end)),
                recent_bookings: ($recent | length),
                cancelled_bookings: ($cancelled | length)
              }
              | select(.score >= 70)
            ]
            | sort_by(-.score)
          ')

          AT_RISK_COUNT=$(echo "$AT_RISK" | jq 'length')
          AT_RISK_TOP=$(echo "$AT_RISK" | jq -r '.[0:10] | map("- id=" + .id + " score=" + (.score|tostring) + " recent=" + (.recent_bookings|tostring) + " cancelled=" + (.cancelled_bookings|tostring)) | join("\n")')

          ALERT="ok"
          REASON=""
          if awk -v v="$RET_30" 'BEGIN{exit (v<45)?0:1}'; then ALERT="critical"; REASON="30d retention under 45%"; fi
          if [ "$ALERT" = "ok" ] && awk -v v="$RET_30" 'BEGIN{exit (v<60)?0:1}'; then ALERT="warn"; REASON="30d retention under 60%"; fi
          if [ "$ALERT" = "ok" ] && awk -v v="$RET_7" 'BEGIN{exit (v<75)?0:1}'; then ALERT="warn"; REASON="7d retention under 75%"; fi
          if [ "$AT_RISK_COUNT" -gt 15 ]; then ALERT="critical"; REASON="${REASON}; at-risk accounts > 15"; fi
          if [ "$ALERT" = "ok" ] && [ "$AT_RISK_COUNT" -gt 8 ]; then ALERT="warn"; REASON="${REASON}; at-risk accounts > 8"; fi

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "ret_7=$RET_7" >> "$GITHUB_OUTPUT"
          echo "ret_30=$RET_30" >> "$GITHUB_OUTPUT"
          echo "ret_60=$RET_60" >> "$GITHUB_OUTPUT"
          echo "ret_90=$RET_90" >> "$GITHUB_OUTPUT"
          echo "at_risk_count=$AT_RISK_COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "at_risk_top<<EOF"
            echo "$AT_RISK_TOP"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "alert=$ALERT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          printf "## Retention & Churn Dashboard (%s)\n\n" "${{ steps.metrics.outputs.today }}" >> "$GITHUB_STEP_SUMMARY"
          printf "**Status:** %s\n\n" "${{ steps.metrics.outputs.alert }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Cohorts retention (active professionals):\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- 7d: %s%%\n" "${{ steps.metrics.outputs.ret_7 }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- 30d: %s%%\n" "${{ steps.metrics.outputs.ret_30 }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- 60d: %s%%\n" "${{ steps.metrics.outputs.ret_60 }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- 90d: %s%%\n\n" "${{ steps.metrics.outputs.ret_90 }}" >> "$GITHUB_STEP_SUMMARY"
          printf "At-risk accounts: %s\n\n" "${{ steps.metrics.outputs.at_risk_count }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Top at-risk accounts:\n%s\n\n" "${{ steps.metrics.outputs.at_risk_top }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Automated actions recommended:\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Trigger retention nudge for score >= 70\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Priority outreach for score >= 85 within 24h\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Offer reactivation discount for inactive 14d+\n" >> "$GITHUB_STEP_SUMMARY"

      - name: Open retention alert issue
        if: steps.metrics.outputs.alert != 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[RETENTION-${{ steps.metrics.outputs.alert }}] Cohort decline - ${{ steps.metrics.outputs.today }}"
          EXISTS=$(gh issue list --repo "${{ github.repository }}" --state open --label retention-alert --json title -q ".[].title" | grep -F "$TITLE" | head -1)
          if [ -n "$EXISTS" ]; then exit 0; fi

          BODY=$(printf "Retention alert level: %s\nReason: %s\n\nCohort retention:\n- 7d: %s%%\n- 30d: %s%%\n- 60d: %s%%\n- 90d: %s%%\n\nAt-risk accounts count: %s\n\nTop at-risk:\n%s\n\nAutomated actions:\n1. Send retention nudge to at-risk accounts\n2. Escalate score>=85 to owner\n3. Monitor retention trend next 48h\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ steps.metrics.outputs.alert }}" "${{ steps.metrics.outputs.reason }}" \
            "${{ steps.metrics.outputs.ret_7 }}" "${{ steps.metrics.outputs.ret_30 }}" "${{ steps.metrics.outputs.ret_60 }}" "${{ steps.metrics.outputs.ret_90 }}" \
            "${{ steps.metrics.outputs.at_risk_count }}" "${{ steps.metrics.outputs.at_risk_top }}")

          gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label "retention-alert,churn-risk,growth-intel"
