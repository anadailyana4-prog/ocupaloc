name: Load + Soak Test

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      load_requests:
        description: "Load test: total requests (default 300)"
        required: false
        default: "300"
      load_concurrency:
        description: "Load test: concurrent requests (default 15)"
        required: false
        default: "15"
      soak_rounds:
        description: "Soak rounds (default 8)"
        required: false
        default: "8"
      soak_requests_per_round:
        description: "Soak requests per round (default 60)"
        required: false
        default: "60"

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TARGET: "https://ocupaloc.ro"

jobs:
  load-test:
    name: Load Test (peak realistic)
    runs-on: ubuntu-latest
    outputs:
      load_p50: ${{ steps.load.outputs.p50 }}
      load_p95: ${{ steps.load.outputs.p95 }}
      load_p99: ${{ steps.load.outputs.p99 }}
      load_rps: ${{ steps.load.outputs.rps }}
      load_failed: ${{ steps.load.outputs.failed }}
      load_verdict: ${{ steps.load.outputs.verdict }}
    steps:
      - name: Install apache2-utils
        run: sudo apt-get install -y apache2-utils -qq

      - name: Run load test
        id: load
        run: |
          N="${{ github.event.inputs.load_requests }}"
          C="${{ github.event.inputs.load_concurrency }}"
          if [ -z "$N" ]; then N="300"; fi
          if [ -z "$C" ]; then C="15"; fi

          echo "Running load test: $N requests, $C concurrent"
          ab -n "$N" -c "$C" -q "$TARGET/" > /tmp/load_out.txt 2>&1 || true

          cat /tmp/load_out.txt

          P50=$(awk '/^ *50%/{print $2}' /tmp/load_out.txt | head -1)
          P95=$(awk '/^ *95%/{print $2}' /tmp/load_out.txt | head -1)
          P99=$(awk '/^ *99%/{print $2}' /tmp/load_out.txt | head -1)
          RPS=$(grep "Requests per second" /tmp/load_out.txt | awk '{print $4}' | head -1)
          FAILED=$(grep "Failed requests" /tmp/load_out.txt | awk '{print $3}' | head -1)

          if [ -z "$P50" ];   then P50="N/A";   fi
          if [ -z "$P95" ];   then P95="N/A";   fi
          if [ -z "$P99" ];   then P99="N/A";   fi
          if [ -z "$RPS" ];   then RPS="N/A";   fi
          if [ -z "$FAILED" ]; then FAILED="0"; fi

          # Evaluate verdict
          VERDICT="PASS"
          if [ "$P95" != "N/A" ] && awk -v v="$P95" 'BEGIN{exit (v>2000)?0:1}'; then VERDICT="WARN_P95"; fi
          if [ "$P99" != "N/A" ] && awk -v v="$P99" 'BEGIN{exit (v>5000)?0:1}'; then VERDICT="FAIL_P99"; fi
          if [ "$FAILED" != "0" ] && [ "$FAILED" != "N/A" ] && awk -v v="$FAILED" -v n="$N" \
            'BEGIN{exit (v/n*100>5)?0:1}'; then VERDICT="FAIL_ERRORS"; fi

          echo "p50=$P50"         >> "$GITHUB_OUTPUT"
          echo "p95=$P95"         >> "$GITHUB_OUTPUT"
          echo "p99=$P99"         >> "$GITHUB_OUTPUT"
          echo "rps=$RPS"         >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"   >> "$GITHUB_OUTPUT"
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "n=$N"             >> "$GITHUB_OUTPUT"
          echo "c=$C"             >> "$GITHUB_OUTPUT"

      - name: Load test endpoints matrix
        id: endpoints
        run: |
          for ENDPOINT in "/api/health" "/booking" "/"; do
            echo "Testing $TARGET$ENDPOINT"
            ab -n 100 -c 10 -q "$TARGET$ENDPOINT" > /tmp/ep_out.txt 2>&1 || true
            EP_P95=$(awk '/^ *95%/{print $2}' /tmp/ep_out.txt | head -1)
            EP_FAIL=$(grep "Failed requests" /tmp/ep_out.txt | awk '{print $3}' | head -1)
            if [ -z "$EP_P95" ];  then EP_P95="N/A";  fi
            if [ -z "$EP_FAIL" ]; then EP_FAIL="0";   fi
            echo "  p95=${EP_P95}ms failed=${EP_FAIL}"
          done

      - name: Write load test summary
        if: always()
        run: |
          P50="${{ steps.load.outputs.p50 }}"
          P95="${{ steps.load.outputs.p95 }}"
          P99="${{ steps.load.outputs.p99 }}"
          RPS="${{ steps.load.outputs.rps }}"
          FAILED="${{ steps.load.outputs.failed }}"
          VERDICT="${{ steps.load.outputs.verdict }}"
          N="${{ steps.load.outputs.n }}"
          C="${{ steps.load.outputs.c }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          printf "## Load Test Results - %s\n\n"       "$DATE"       >> "$GITHUB_STEP_SUMMARY"
          printf "**Verdict:** %s\n\n"                  "$VERDICT"    >> "$GITHUB_STEP_SUMMARY"
          printf "**Config:** %s requests, %s concurrent\n\n" "$N" "$C" >> "$GITHUB_STEP_SUMMARY"
          printf "### Latency Percentiles\n\n"                         >> "$GITHUB_STEP_SUMMARY"
          printf -- "- p50: %s ms\n"                       "$P50"        >> "$GITHUB_STEP_SUMMARY"
          printf -- "- p95: %s ms  (threshold: <2000ms)\n" "$P95"        >> "$GITHUB_STEP_SUMMARY"
          printf -- "- p99: %s ms  (threshold: <5000ms)\n" "$P99"        >> "$GITHUB_STEP_SUMMARY"
          printf "\n### Throughput\n\n"                                >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Requests/sec: %s\n"                 "$RPS"        >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Failed requests: %s\n"              "$FAILED"     >> "$GITHUB_STEP_SUMMARY"

  soak-test:
    name: Soak Test (30-60 min sustained)
    runs-on: ubuntu-latest
    needs: load-test
    outputs:
      soak_max_p95: ${{ steps.soak.outputs.max_p95 }}
      soak_total_failed: ${{ steps.soak.outputs.total_failed }}
      soak_verdict: ${{ steps.soak.outputs.verdict }}
    steps:
      - name: Install apache2-utils
        run: sudo apt-get install -y apache2-utils -qq

      - name: Run soak test
        id: soak
        run: |
          ROUNDS="${{ github.event.inputs.soak_rounds }}"
          RPR="${{ github.event.inputs.soak_requests_per_round }}"
          if [ -z "$ROUNDS" ]; then ROUNDS="8"; fi
          if [ -z "$RPR" ];    then RPR="60";   fi

          MAX_P95=0
          TOTAL_FAILED=0
          ROUND=1

          while [ "$ROUND" -le "$ROUNDS" ]; do
            echo "Soak round $ROUND/$ROUNDS"
            ab -n "$RPR" -c 5 -q "$TARGET/" > /tmp/soak_out.txt 2>&1 || true

            ROUND_P95=$(awk '/^ *95%/{print $2}' /tmp/soak_out.txt | head -1)
            ROUND_FAIL=$(grep "Failed requests" /tmp/soak_out.txt | awk '{print $3}' | head -1)
            if [ -z "$ROUND_P95" ];  then ROUND_P95="0";  fi
            if [ -z "$ROUND_FAIL" ]; then ROUND_FAIL="0"; fi

            echo "  round=$ROUND p95=${ROUND_P95}ms failed=${ROUND_FAIL}"

            if awk -v cur="$ROUND_P95" -v max="$MAX_P95" 'BEGIN{exit (cur>max)?0:1}'; then
              MAX_P95="$ROUND_P95"
            fi
            TOTAL_FAILED=$(( TOTAL_FAILED + ROUND_FAIL ))

            ROUND=$(( ROUND + 1 ))
            if [ "$ROUND" -le "$ROUNDS" ]; then
              echo "  Waiting 240 seconds before next round..."
              sleep 240
            fi
          done

          # Evaluate soak verdict
          VERDICT="PASS"
          if awk -v v="$MAX_P95" 'BEGIN{exit (v>2500)?0:1}'; then VERDICT="WARN_LATENCY_DRIFT"; fi
          if [ "$TOTAL_FAILED" -gt 10 ]; then VERDICT="FAIL_ERRORS"; fi

          echo "max_p95=$MAX_P95"           >> "$GITHUB_OUTPUT"
          echo "total_failed=$TOTAL_FAILED" >> "$GITHUB_OUTPUT"
          echo "verdict=$VERDICT"           >> "$GITHUB_OUTPUT"
          echo "rounds=$ROUNDS"             >> "$GITHUB_OUTPUT"

      - name: Write soak test summary
        if: always()
        run: |
          MAX_P95="${{ steps.soak.outputs.max_p95 }}"
          TOTAL_FAIL="${{ steps.soak.outputs.total_failed }}"
          VERDICT="${{ steps.soak.outputs.verdict }}"
          ROUNDS="${{ steps.soak.outputs.rounds }}"

          printf "\n## Soak Test Results\n\n"                                   >> "$GITHUB_STEP_SUMMARY"
          printf "**Verdict:** %s\n\n"              "$VERDICT"                  >> "$GITHUB_STEP_SUMMARY"
          printf "**Rounds:** %s x 60 req @ 5 concurrent (240s apart)\n\n" "$ROUNDS" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Max p95 latency: %s ms  (threshold: <2500ms)\n" "$MAX_P95" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- Total failed requests: %s  (threshold: <10)\n"  "$TOTAL_FAIL" >> "$GITHUB_STEP_SUMMARY"

  report:
    name: Consolidated Load/Soak Report
    runs-on: ubuntu-latest
    needs: [load-test, soak-test]
    if: always()
    steps:
      - name: Ensure label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create load-test --color 0284c7 --description "Load/soak test report" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Evaluate overall result and open issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOAD_V="${{ needs.load-test.outputs.load_verdict }}"
          SOAK_V="${{ needs.soak-test.outputs.soak_verdict }}"
          LOAD_P95="${{ needs.load-test.outputs.load_p95 }}"
          LOAD_P99="${{ needs.load-test.outputs.load_p99 }}"
          LOAD_RPS="${{ needs.load-test.outputs.load_rps }}"
          LOAD_FAIL="${{ needs.load-test.outputs.load_failed }}"
          SOAK_P95="${{ needs.soak-test.outputs.soak_max_p95 }}"
          SOAK_FAIL="${{ needs.soak-test.outputs.soak_total_failed }}"
          DATE=$(date -u +"%Y-%m-%d")

          OVERALL="PASS"
          if echo "$LOAD_V $SOAK_V" | grep -q "FAIL"; then OVERALL="FAIL"; fi
          if [ "$OVERALL" = "PASS" ] && echo "$LOAD_V $SOAK_V" | grep -q "WARN"; then OVERALL="WARN"; fi

          printf "\n## Overall Load/Soak Verdict: %s\n" "$OVERALL" >> "$GITHUB_STEP_SUMMARY"

          if [ "$OVERALL" = "FAIL" ] || [ "$OVERALL" = "WARN" ]; then
            TITLE="[LOAD-TEST] ${OVERALL}: Load/Soak test - $DATE"
            EXISTS=$(gh issue list --repo "${{ github.repository }}" --state open --label load-test \
              --json title -q ".[].title" | grep -F "$TITLE" | head -1)
            if [ -n "$EXISTS" ]; then echo "Deduplicated."; exit 0; fi

            BODY=$(printf "Load/soak test result: %s on %s.\n\nLoad test verdict: %s\nSoak test verdict: %s\n\nLoad test results:\n- p95: %s ms\n- p99: %s ms\n- rps: %s\n- failed: %s\n\nSoak test results:\n- max p95: %s ms\n- total failed: %s\n\nThresholds:\n- Load p95 warning: 2000ms, critical: 5000ms (p99)\n- Soak max p95 warning: 2500ms\n- Failed requests critical: >5%% (load) or >10 (soak)\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "$OVERALL" "$DATE" "$LOAD_V" "$SOAK_V" \
              "$LOAD_P95" "$LOAD_P99" "$LOAD_RPS" "$LOAD_FAIL" \
              "$SOAK_P95" "$SOAK_FAIL")

            gh issue create \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "load-test,incident"
          fi
