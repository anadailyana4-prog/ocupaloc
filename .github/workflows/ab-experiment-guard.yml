name: A/B Experiment Guardrails

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      experiment_id:
        description: "Experiment ID or name to evaluate (optional)"
        required: false
        default: ""
      baseline_hours:
        description: "Baseline window in hours (default: 168 = 7 days)"
        required: false
        default: "168"

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guardrail-check:
    name: A/B Safety Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ab-guardrail   --color 7c3aed --description "A/B experiment guardrail"  --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create ab-regression  --color b60205 --description "A/B conversion regression" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create rollout-block  --color e11d48 --description "Rollout blocked by guardrail" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Collect baseline metrics
        id: baseline
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          HOURS="${{ github.event.inputs.baseline_hours }}"
          if [ -z "$HOURS" ]; then HOURS="168"; fi

          SINCE=$(date -u -d "${HOURS} hours ago" +"%Y-%m-%dT%H:%M:%SZ")

          ROWS=$(curl -sf \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/operational_events?select=flow,outcome,latency_ms,event_type,created_at&created_at=gte.${SINCE}&limit=10000" \
            || echo "[]")

          B_TOTAL=$(echo "$ROWS" | jq '[.[] | select(.flow=="booking")] | length')
          B_OK=$(echo "$ROWS"    | jq '[.[] | select(.flow=="booking" and .outcome=="success")] | length')
          ERR_TOTAL=$(echo "$ROWS" | jq '[.[] | select(.outcome=="failure" or .outcome=="error")] | length')
          ALL_TOTAL=$(echo "$ROWS" | jq 'length')

          B_RATE=$(awk -v ok="$B_OK" -v tot="$B_TOTAL" \
            'BEGIN{if(tot==0) print "-1"; else printf "%.2f", (ok*100)/tot}')
          ERR_RATE=$(awk -v err="$ERR_TOTAL" -v tot="$ALL_TOTAL" \
            'BEGIN{if(tot==0) print "0"; else printf "%.2f", (err*100)/tot}')

          P95_ALL=$(echo "$ROWS" | jq -r \
            '[.[].latency_ms | select(type=="number")] | sort | if length==0 then "-1" else .[((length*0.95)|floor)] end')

          echo "b_total=$B_TOTAL"   >> "$GITHUB_OUTPUT"
          echo "b_rate=$B_RATE"     >> "$GITHUB_OUTPUT"
          echo "err_rate=$ERR_RATE" >> "$GITHUB_OUTPUT"
          echo "p95=$P95_ALL"       >> "$GITHUB_OUTPUT"
          echo "hours=$HOURS"       >> "$GITHUB_OUTPUT"

      - name: Collect current (1h) metrics
        id: current
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SINCE=$(date -u -d "1 hour ago" +"%Y-%m-%dT%H:%M:%SZ")

          ROWS=$(curl -sf \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/operational_events?select=flow,outcome,latency_ms,created_at&created_at=gte.${SINCE}&limit=2000" \
            || echo "[]")

          B_TOTAL=$(echo "$ROWS" | jq '[.[] | select(.flow=="booking")] | length')
          B_OK=$(echo "$ROWS"    | jq '[.[] | select(.flow=="booking" and .outcome=="success")] | length')
          ERR_TOTAL=$(echo "$ROWS" | jq '[.[] | select(.outcome=="failure" or .outcome=="error")] | length')
          ALL_TOTAL=$(echo "$ROWS" | jq 'length')

          B_RATE=$(awk -v ok="$B_OK" -v tot="$B_TOTAL" \
            'BEGIN{if(tot==0) print "-1"; else printf "%.2f", (ok*100)/tot}')
          ERR_RATE=$(awk -v err="$ERR_TOTAL" -v tot="$ALL_TOTAL" \
            'BEGIN{if(tot==0) print "0"; else printf "%.2f", (err*100)/tot}')

          P95=$(echo "$ROWS" | jq -r \
            '[.[].latency_ms | select(type=="number")] | sort | if length==0 then "-1" else .[((length*0.95)|floor)] end')

          echo "b_total=$B_TOTAL" >> "$GITHUB_OUTPUT"
          echo "b_rate=$B_RATE"   >> "$GITHUB_OUTPUT"
          echo "err_rate=$ERR_RATE" >> "$GITHUB_OUTPUT"
          echo "p95=$P95"         >> "$GITHUB_OUTPUT"

      - name: Evaluate safety thresholds
        id: eval
        run: |
          BASE_B="${{ steps.baseline.outputs.b_rate }}"
          CUR_B="${{ steps.current.outputs.b_rate }}"
          BASE_ERR="${{ steps.baseline.outputs.err_rate }}"
          CUR_ERR="${{ steps.current.outputs.err_rate }}"
          BASE_P95="${{ steps.baseline.outputs.p95 }}"
          CUR_P95="${{ steps.current.outputs.p95 }}"
          CUR_TOTAL="${{ steps.current.outputs.b_total }}"

          VERDICT="PASS"
          BLOCK_REASONS=""

          # Only evaluate if we have enough current traffic (>= 5 bookings)
          if [ "$CUR_TOTAL" -lt 5 ]; then
            echo "verdict=SKIP (insufficient traffic: $CUR_TOTAL bookings in 1h)" >> "$GITHUB_OUTPUT"
            echo "block_reasons=Insufficient traffic for guardrail evaluation" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conversion regression: current < baseline - 5pp
          if [ "$BASE_B" != "-1" ] && [ "$CUR_B" != "-1" ]; then
            DELTA=$(awk -v base="$BASE_B" -v cur="$CUR_B" 'BEGIN{printf "%.2f", base-cur}')
            if awk -v d="$DELTA" 'BEGIN{exit (d>5)?0:1}'; then
              VERDICT="BLOCK"
              BLOCK_REASONS="Conversion regression: baseline ${BASE_B}%% -> current ${CUR_B}%% (delta -${DELTA}pp exceeds 5pp threshold)"
            fi
          fi

          # Error rate spike: current > baseline * 2 AND > 5%
          if awk -v cur="$CUR_ERR" -v base="$BASE_ERR" 'BEGIN{exit (cur > base*2 && cur > 5)?0:1}'; then
            if [ "$VERDICT" = "PASS" ]; then VERDICT="BLOCK"; fi
            BLOCK_REASONS="${BLOCK_REASONS}; Error rate spike: baseline ${BASE_ERR}%% -> current ${CUR_ERR}%%"
          fi

          # Latency regression: current p95 > baseline p95 * 1.5 AND > 2000ms
          if [ "$BASE_P95" != "-1" ] && [ "$CUR_P95" != "-1" ]; then
            THRESHOLD=$(awk -v v="$BASE_P95" 'BEGIN{printf "%d", v*1.5}')
            if awk -v cur="$CUR_P95" -v thr="$THRESHOLD" 'BEGIN{exit (cur>thr && cur>2000)?0:1}'; then
              if [ "$VERDICT" = "PASS" ]; then VERDICT="BLOCK"; fi
              BLOCK_REASONS="${BLOCK_REASONS}; Latency regression: p95 ${CUR_P95}ms vs baseline ${BASE_P95}ms"
            fi
          fi

          echo "verdict=$VERDICT"               >> "$GITHUB_OUTPUT"
          echo "block_reasons=$BLOCK_REASONS"   >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          VERDICT="${{ steps.eval.outputs.verdict }}"
          BASE_B="${{ steps.baseline.outputs.b_rate }}"
          CUR_B="${{ steps.current.outputs.b_rate }}"
          BASE_ERR="${{ steps.baseline.outputs.err_rate }}"
          CUR_ERR="${{ steps.current.outputs.err_rate }}"
          BASE_P95="${{ steps.baseline.outputs.p95 }}"
          CUR_P95="${{ steps.current.outputs.p95 }}"
          HOURS="${{ steps.baseline.outputs.hours }}"
          REASONS="${{ steps.eval.outputs.block_reasons }}"
          EXP="${{ github.event.inputs.experiment_id }}"
          if [ -z "$EXP" ]; then EXP="(latest deploy on main)"; fi

          printf "## A/B Guardrail Check\n\n"                                     >> "$GITHUB_STEP_SUMMARY"
          printf "**Experiment:** %s\n"           "$EXP"                           >> "$GITHUB_STEP_SUMMARY"
          printf "**Verdict:** %s\n\n"            "$VERDICT"                       >> "$GITHUB_STEP_SUMMARY"
          printf "### Safety Metrics\n\n"                                           >> "$GITHUB_STEP_SUMMARY"
          printf "Metric: Conversion rate\n"                                        >> "$GITHUB_STEP_SUMMARY"
          printf "  Baseline (%sh): %s%%  Current (1h): %s%%\n" "$HOURS" "$BASE_B" "$CUR_B" >> "$GITHUB_STEP_SUMMARY"
          printf "Metric: Error rate\n"                                             >> "$GITHUB_STEP_SUMMARY"
          printf "  Baseline: %s%%  Current: %s%%\n" "$BASE_ERR" "$CUR_ERR"        >> "$GITHUB_STEP_SUMMARY"
          printf "Metric: p95 latency\n"                                            >> "$GITHUB_STEP_SUMMARY"
          printf "  Baseline: %s ms  Current: %s ms\n" "$BASE_P95" "$CUR_P95"      >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$REASONS" ]; then
            printf "\n### Block Reasons\n\n%s\n" "$REASONS"                         >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open rollout-block issue
        if: steps.eval.outputs.verdict == 'BLOCK'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          EXP="${{ github.event.inputs.experiment_id }}"
          if [ -z "$EXP" ]; then EXP="deploy-${SHORT_SHA}"; fi

          TITLE="[ROLLOUT-BLOCK] A/B guardrail triggered - $EXP"
          EXISTS=$(gh issue list --repo "${{ github.repository }}" --state open --label rollout-block \
            --json title -q ".[].title" | grep -F "$TITLE" | head -1)
          if [ -n "$EXISTS" ]; then echo "Deduplicated."; exit 0; fi

          REASONS="${{ steps.eval.outputs.block_reasons }}"
          BASE_B="${{ steps.baseline.outputs.b_rate }}"
          CUR_B="${{ steps.current.outputs.b_rate }}"
          BASE_ERR="${{ steps.baseline.outputs.err_rate }}"
          CUR_ERR="${{ steps.current.outputs.err_rate }}"

          BODY=$(printf "Rollout BLOCKED by A/B guardrail at %s.\n\nExperiment: %s\nCommit: %s\n\nBlock reasons:\n%s\n\nMetrics comparison:\n- Conversion: baseline %s%% -> current %s%%\n- Error rate: baseline %s%% -> current %s%%\n\nRequired actions:\n1. Review recent changes in this deploy\n2. Check Vercel deployment logs for errors\n3. Consider rollback if pattern persists >15 min\n4. Close this issue once resolved\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "$TODAY" "$EXP" "$SHA" "$REASONS" "$BASE_B" "$CUR_B" "$BASE_ERR" "$CUR_ERR")

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "ab-guardrail,rollout-block,incident"
