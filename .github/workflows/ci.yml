name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt into Node.js 24 runtime for all actions (removes Node20 deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify clean git tree (no uncommitted generated files)
        run: |
          STATUS=$(git status --porcelain)
          if [ -n "$STATUS" ]; then
            echo "::error::Dirty working tree detected after checkout:"
            echo "$STATUS"
            echo "Ensure no generated files are committed without being tracked."
            exit 1
          fi
          echo "✓ Git tree is clean."

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce pnpm-only lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json detected. This repo uses pnpm only."
            exit 1
          fi

      - name: "🔐 Validate critical secrets for E2E release tests"
        run: |
          if [ "${{ vars.ENABLE_E2E }}" = "true" ]; then
            if [ -z "${{ secrets.PLAYWRIGHT_LOGIN_EMAIL }}" ]; then
              echo "::error::CRITICAL: PLAYWRIGHT_LOGIN_EMAIL secret is required for E2E release validation."
              echo "Add it to: Settings → Secrets and variables → Actions → New repository secret"
              exit 1
            fi
            if [ -z "${{ secrets.PLAYWRIGHT_LOGIN_PASSWORD }}" ]; then
              echo "::error::CRITICAL: PLAYWRIGHT_LOGIN_PASSWORD secret is required for E2E release validation."
              echo "Add it to: Settings → Secrets and variables → Actions → New repository secret"
              exit 1
            fi
            echo "✓ E2E secrets validated: PLAYWRIGHT_LOGIN_EMAIL and PLAYWRIGHT_LOGIN_PASSWORD are set."
          fi

      - name: Scan for hardcoded credentials in E2E tests
        run: |
          echo "Scanning tests/e2e/ for hardcoded email addresses and password literals..."
          if grep -rn --include="*.ts" --include="*.js" \
            -E "@(gmail|yahoo|hotmail|outlook)\.(com|ro)" \
            tests/e2e/ 2>/dev/null; then
            echo "::error::Hardcoded email addresses detected in E2E tests. Use PLAYWRIGHT_LOGIN_EMAIL / PLAYWRIGHT_TEST_CLIENT_EMAIL env vars."
            exit 1
          fi
          if grep -rn --include="*.ts" --include="*.js" \
            -E "(P|p)assword\s*=\s*'[^'\$\{]" \
            tests/e2e/ 2>/dev/null; then
            echo "::error::Hardcoded password literals detected in E2E tests. Use PLAYWRIGHT_LOGIN_PASSWORD env var."
            exit 1
          fi
          echo "Credential scan passed — no hardcoded credentials found."

      - name: Scan for ad-hoc debug/temp test files
        run: |
          echo "Checking for debug/temp E2E test files that must not enter CI..."
          BAD_FILES=$(find tests/e2e -name "*.spec.ts" | grep -E "(debug|temp|capture|inspect|scratch)" || true)
          if [ -n "$BAD_FILES" ]; then
            echo "::error::Ad-hoc debug spec files found in tests/e2e/:"
            echo "$BAD_FILES"
            echo "Remove them before merging."
            exit 1
          fi
          echo "Ad-hoc file scan passed."


      - name: Unit tests, types, lint, audit
        run: pnpm run check:all

      - name: Build
        run: pnpm exec next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://ocupaloc.ro

      - name: Install Playwright browser (E2E only)
        if: ${{ vars.ENABLE_E2E == 'true' }}
        run: pnpm exec playwright install --with-deps chromium

      - name: "🚀 E2E Release Validation — Run 1 (CRITICAL)"
        if: ${{ vars.ENABLE_E2E == 'true' }}
        id: e2e_run1
        env:
          PLAYWRIGHT_REQUIRE_EXECUTION: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_BOOKING_SLUG: ${{ vars.PLAYWRIGHT_BOOKING_SLUG }}
          PLAYWRIGHT_ENABLE_DEMO_SMOKE: ${{ vars.PLAYWRIGHT_ENABLE_DEMO_SMOKE }}
          PLAYWRIGHT_LOGIN_EMAIL: ${{ secrets.PLAYWRIGHT_LOGIN_EMAIL }}
          PLAYWRIGHT_LOGIN_PASSWORD: ${{ secrets.PLAYWRIGHT_LOGIN_PASSWORD }}
        run: |
          echo "▶ E2E Run 1/2 — Release validation (determinism check)..."
          pnpm run test:e2e
          echo "✅ E2E Run 1 passed."

      - name: "🔁 E2E Release Validation — Run 2 (Determinism)"
        if: ${{ vars.ENABLE_E2E == 'true' && steps.e2e_run1.outcome == 'success' }}
        env:
          PLAYWRIGHT_REQUIRE_EXECUTION: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_BOOKING_SLUG: ${{ vars.PLAYWRIGHT_BOOKING_SLUG }}
          PLAYWRIGHT_ENABLE_DEMO_SMOKE: ${{ vars.PLAYWRIGHT_ENABLE_DEMO_SMOKE }}
          PLAYWRIGHT_LOGIN_EMAIL: ${{ secrets.PLAYWRIGHT_LOGIN_EMAIL }}
          PLAYWRIGHT_LOGIN_PASSWORD: ${{ secrets.PLAYWRIGHT_LOGIN_PASSWORD }}
        run: |
          echo "▶ E2E Run 2/2 — Determinism confirmation..."
          pnpm run test:e2e
          echo "✅ E2E Run 2 passed — determinism confirmed."

      - name: "🌐 Post-build production health check"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting 30s for Vercel deployment to propagate..."
          sleep 30
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://ocupaloc.ro/api/health")
          echo "Health endpoint returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Production health check returned HTTP $HTTP_STATUS after push to main."
          else
            echo "✅ Production health check OK."
          fi

      - name: "🛰️ Run external synthetic monitor"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SYNTHETIC_BASE_URL: https://ocupaloc.ro
          SYNTHETIC_MONITOR_SECRET: ${{ secrets.SYNTHETIC_MONITOR_SECRET }}
          REMINDERS_CRON_SECRET: ${{ secrets.REMINDERS_CRON_SECRET }}
        run: |
          if [ -z "$SYNTHETIC_MONITOR_SECRET" ] && [ -z "$REMINDERS_CRON_SECRET" ]; then
            echo "::warning::SYNTHETIC_MONITOR_SECRET/REMINDERS_CRON_SECRET missing. Skipping synthetic trigger."
            exit 0
          fi
          pnpm run ops:synthetic

      - name: "📉 Enforce SLO release gate"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SLO_BASE_URL: https://ocupaloc.ro
          SLO_READ_SECRET: ${{ secrets.SLO_READ_SECRET }}
          REMINDERS_CRON_SECRET: ${{ secrets.REMINDERS_CRON_SECRET }}
          SLO_WINDOW_MINUTES: "60"
        run: |
          if [ -z "$SLO_READ_SECRET" ] && [ -z "$REMINDERS_CRON_SECRET" ]; then
            echo "::warning::SLO_READ_SECRET/REMINDERS_CRON_SECRET missing. Skipping SLO gate."
            exit 0
          fi
          pnpm run ops:slo

  # ─────────────────────────────────────────────────────────────────────────
  # Summary gate — satisfies the "CI" required branch-protection check.
  # Branch protection requires BOTH "Typecheck, Lint & Build" (job: check)
  # AND "CI" (this job). This job only passes when `check` passes, so it
  # acts as a single mergeable signal without duplicating any logic.
  # ─────────────────────────────────────────────────────────────────────────
  ci:
    name: CI
    needs: check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check gate result
        run: |
          if [ "${{ needs.check.result }}" != "success" ]; then
            echo "::error::CI gate failed — 'Typecheck, Lint & Build' did not succeed."
            exit 1
          fi
          echo "✓ CI gate passed."

