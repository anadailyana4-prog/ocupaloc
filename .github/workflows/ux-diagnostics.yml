name: UX Diagnostics

on:
  schedule:
    - cron: "35 7 * * *"
  workflow_dispatch:

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnostics:
    name: Session Replay + UX Diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ux-diagnostics --color 14b8a6 --description "UX blockers and replay diagnostics" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create ux-blocker --color dc2626 --description "Repeated UX blocker" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Analyze repeated booking failures
        id: ux
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLARITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
        run: |
          SINCE_7=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          TODAY=$(date -u +"%Y-%m-%d")

          ROWS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/operational_events?select=event_type,metadata,created_at&created_at=gte.${SINCE_7}&limit=20000" || echo "[]")

          FAIL_REASONS=$(echo "$ROWS" | jq -r '
            [.[] | select(.event_type=="booking_submit_failed") | (.metadata.reason // "unknown")] \
            | group_by(.) \
            | map({reason: .[0], count: length}) \
            | sort_by(-.count)
          ')

          TOP_BLOCKERS=$(echo "$FAIL_REASONS" | jq -r '.[0:5] | map("- " + .reason + " (" + (.count|tostring) + ")") | join("\n")')
          REPEATED=$(echo "$FAIL_REASONS" | jq '[.[] | select(.count >= 5)] | length')
          REPEATED_REASON=$(echo "$FAIL_REASONS" | jq -r 'first(.[] | select(.count >= 5) | .reason) // ""')
          REPEATED_COUNT=$(echo "$FAIL_REASONS" | jq -r 'first(.[] | select(.count >= 5) | .count) // 0')

          BOOKING_VIEWS=$(echo "$ROWS" | jq '[.[] | select(.event_type=="booking_public_page_view")] | length')
          FORM_STARTS=$(echo "$ROWS" | jq '[.[] | select(.event_type=="booking_form_started")] | length')
          SUBMIT_FAILS=$(echo "$ROWS" | jq '[.[] | select(.event_type=="booking_submit_failed")] | length')

          HEATMAP_SEGMENTS=$(printf "- booking public page: /[slug]\n- login/dashboard: /login, /dashboard\n- onboarding: /signup, /onboarding")
          REPLAY_STATUS="inactive"
          REPLAY_LINK="Set NEXT_PUBLIC_CLARITY_PROJECT_ID to enable replay dashboard link"
          if [ -n "$CLARITY_PROJECT_ID" ]; then
            REPLAY_STATUS="active"
            REPLAY_LINK="https://clarity.microsoft.com/projects/view/${CLARITY_PROJECT_ID}"
          fi

          ALERT="ok"
          if [ "$REPEATED" -gt 0 ]; then ALERT="warn"; fi
          if [ "$SUBMIT_FAILS" -gt 20 ]; then ALERT="critical"; fi

          echo "top_blockers=$TOP_BLOCKERS" >> "$GITHUB_OUTPUT"
          echo "repeated=$REPEATED" >> "$GITHUB_OUTPUT"
          echo "repeated_reason=$REPEATED_REASON" >> "$GITHUB_OUTPUT"
          echo "repeated_count=$REPEATED_COUNT" >> "$GITHUB_OUTPUT"
          echo "booking_views=$BOOKING_VIEWS" >> "$GITHUB_OUTPUT"
          echo "form_starts=$FORM_STARTS" >> "$GITHUB_OUTPUT"
          echo "submit_fails=$SUBMIT_FAILS" >> "$GITHUB_OUTPUT"
          {
            echo "heatmap_segments<<EOF"
            echo "$HEATMAP_SEGMENTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "replay_status=$REPLAY_STATUS" >> "$GITHUB_OUTPUT"
          echo "replay_link=$REPLAY_LINK" >> "$GITHUB_OUTPUT"
          echo "alert=$ALERT" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          printf "## UX Diagnostics (%s)\n\n" "${{ steps.ux.outputs.today }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Replay integration: %s\n" "${{ steps.ux.outputs.replay_status }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Replay dashboard: %s\n\n" "${{ steps.ux.outputs.replay_link }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Critical page segments:\n%s\n\n" "${{ steps.ux.outputs.heatmap_segments }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Booking behavioral diagnostics (7d):\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- page views: %s\n" "${{ steps.ux.outputs.booking_views }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- form starts: %s\n" "${{ steps.ux.outputs.form_starts }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- submit failures: %s\n\n" "${{ steps.ux.outputs.submit_fails }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Top UX blockers:\n%s\n" "${{ steps.ux.outputs.top_blockers }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create repeated blocker issue
        if: steps.ux.outputs.repeated != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[UX-BLOCKER] Repeated blocker - ${{ steps.ux.outputs.repeated_reason }}"
          EXISTS=$(gh issue list --repo "${{ github.repository }}" --state open --label ux-blocker --json title -q ".[].title" | grep -F "$TITLE" | head -1)
          if [ -n "$EXISTS" ]; then exit 0; fi

          BODY=$(printf "Repeated UX blocker detected.\n\nBlocker: %s\nOccurrences (7d): %s\n\nIssue template:\n- Impacted page(s): booking/login/dashboard/onboarding\n- User intent: complete booking/onboarding\n- Observed behavior: %s\n- Expected behavior: successful progress without error\n- Replay segment link: %s\n- Repro steps: inspect latest sessions with this blocker\n- Proposed fix: validate input + clearer inline error + retry CTA\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ steps.ux.outputs.repeated_reason }}" "${{ steps.ux.outputs.repeated_count }}" "${{ steps.ux.outputs.repeated_reason }}" "${{ steps.ux.outputs.replay_link }}")

          gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label "ux-diagnostics,ux-blocker"
