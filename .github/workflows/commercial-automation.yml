name: Commercial Automation

on:
  schedule:
    - cron: "45 7 * * *"
  workflow_dispatch:

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  automation:
    name: Onboarding, Retention, CRM and Referral Automation
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create growth-automation --color 0891b2 --description "Commercial automation" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Build growth automation queues
        id: q
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRM_WEBHOOK: ${{ secrets.CRM_SYNC_WEBHOOK_URL }}
          CRM_TOKEN: ${{ secrets.CRM_SYNC_WEBHOOK_BEARER_TOKEN }}
          NUDGE_WEBHOOK: ${{ secrets.GROWTH_NUDGE_WEBHOOK_URL }}
          NUDGE_TOKEN: ${{ secrets.GROWTH_NUDGE_BEARER_TOKEN }}
        run: |
          SINCE_1=$(date -u -d "1 day ago" +"%Y-%m-%dT%H:%M:%SZ")
          SINCE_14=$(date -u -d "14 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          TODAY=$(date -u +"%Y-%m-%d")

          PROFS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/profesionisti?select=id,slug,nume_business,onboarding_pas,created_at&limit=5000" || echo "[]")

          BOOKS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/programari?select=profesionist_id,created_at,status&limit=20000" || echo "[]")

          EVENTS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/operational_events?select=event_type,metadata,created_at&created_at=gte.${SINCE_14}&limit=20000" || echo "[]")

          ONBOARDING_QUEUE=$(jq -n --argjson profs "$PROFS" '
            [ $profs[] | select((.onboarding_pas // 0) < 4) | {id, slug, business: .nume_business, reason: "onboarding_incomplete"} ]
          ')

          RETENTION_QUEUE=$(jq -n --argjson profs "$PROFS" --argjson books "$BOOKS" --arg s14 "$SINCE_14" '
            [
              $profs[] as $p |
              ([ $books[] | select(.profesionist_id == $p.id and .created_at >= $s14) ] | length) as $recent |
              select($recent == 0) |
              {id: $p.id, slug: $p.slug, business: $p.nume_business, reason: "inactive_14d"}
            ]
          ')

          NEW_PROFS=$(echo "$PROFS" | jq --arg s "$SINCE_1" '[.[] | select(.created_at >= $s)]')

          REF_VISITS=$(echo "$EVENTS" | jq '[.[] | select(.event_type=="referral_attributed_visit")] | length')
          REF_BOOKINGS=$(echo "$EVENTS" | jq '[.[] | select(.event_type=="booking_submit_success" and ((.metadata.referral_code // "") != ""))] | length')

          ONBOARDING_COUNT=$(echo "$ONBOARDING_QUEUE" | jq 'length')
          RETENTION_COUNT=$(echo "$RETENTION_QUEUE" | jq 'length')
          NEW_COUNT=$(echo "$NEW_PROFS" | jq 'length')

          CRM_STATUS="inactive"
          if [ -n "$CRM_WEBHOOK" ]; then
            PAYLOAD=$(jq -n --argjson leads "$NEW_PROFS" '{event:"crm_sync", leads:$leads}')
            HTTP=$(curl -s -o /tmp/crm_resp.txt -w "%{http_code}" -X POST "$CRM_WEBHOOK" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $CRM_TOKEN" \
              -d "$PAYLOAD" || echo "000")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || [ "$HTTP" = "202" ]; then CRM_STATUS="active"; else CRM_STATUS="failed_http_${HTTP}"; fi
          fi

          NUDGE_STATUS="inactive"
          if [ -n "$NUDGE_WEBHOOK" ]; then
            PAYLOAD=$(jq -n --argjson onboarding "$ONBOARDING_QUEUE" --argjson retention "$RETENTION_QUEUE" '{event:"growth_nudges", onboarding:onboarding, retention:retention}')
            HTTP=$(curl -s -o /tmp/nudge_resp.txt -w "%{http_code}" -X POST "$NUDGE_WEBHOOK" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $NUDGE_TOKEN" \
              -d "$PAYLOAD" || echo "000")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || [ "$HTTP" = "202" ]; then NUDGE_STATUS="active"; else NUDGE_STATUS="failed_http_${HTTP}"; fi
          fi

          echo "onboarding_count=$ONBOARDING_COUNT" >> "$GITHUB_OUTPUT"
          echo "retention_count=$RETENTION_COUNT" >> "$GITHUB_OUTPUT"
          echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"
          echo "ref_visits=$REF_VISITS" >> "$GITHUB_OUTPUT"
          echo "ref_bookings=$REF_BOOKINGS" >> "$GITHUB_OUTPUT"
          echo "crm_status=$CRM_STATUS" >> "$GITHUB_OUTPUT"
          echo "nudge_status=$NUDGE_STATUS" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          printf "## Commercial Automation (%s)\n\n" "${{ steps.q.outputs.today }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Active flows:\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- onboarding nudges: %s (trigger: onboarding_pas < 4)\n" "${{ steps.q.outputs.nudge_status }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- retention nudges: %s (trigger: inactive 14d)\n" "${{ steps.q.outputs.nudge_status }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- CRM sync: %s (trigger: new professionals in last 24h)\n" "${{ steps.q.outputs.crm_status }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- referral attribution tracking: active (trigger: ref/referral query params)\n\n" >> "$GITHUB_STEP_SUMMARY"

          printf "Current queue sizes:\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- onboarding nudges queue: %s\n" "${{ steps.q.outputs.onboarding_count }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- retention nudges queue: %s\n" "${{ steps.q.outputs.retention_count }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- CRM new leads/professionals: %s\n" "${{ steps.q.outputs.new_count }}" >> "$GITHUB_STEP_SUMMARY"

          REF_RATE=$(awk -v b="${{ steps.q.outputs.ref_bookings }}" -v v="${{ steps.q.outputs.ref_visits }}" 'BEGIN{if(v==0) print "0.0"; else printf "%.1f", (b*100)/v}')
          printf "\nReferral impact:\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- attributed visits (14d): %s\n" "${{ steps.q.outputs.ref_visits }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- attributed bookings (14d): %s\n" "${{ steps.q.outputs.ref_bookings }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- referral conversion: %s%%\n" "$REF_RATE" >> "$GITHUB_STEP_SUMMARY"

      - name: Create automation digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[GROWTH-AUTOMATION] Daily queue - ${{ steps.q.outputs.today }}"
          EXISTS=$(gh issue list --repo "${{ github.repository }}" --state open --label growth-automation --json title -q ".[].title" | grep -F "$TITLE" | head -1)
          if [ -n "$EXISTS" ]; then exit 0; fi

          BODY=$(printf "Commercial automation digest.\n\nFlow status:\n- onboarding nudges: %s\n- retention nudges: %s\n- CRM sync: %s\n\nQueues:\n- onboarding: %s\n- retention: %s\n- new leads: %s\n\nReferral:\n- visits: %s\n- bookings: %s\n\nIf webhooks are inactive, configure secrets CRM_SYNC_WEBHOOK_URL / GROWTH_NUDGE_WEBHOOK_URL.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ steps.q.outputs.nudge_status }}" "${{ steps.q.outputs.nudge_status }}" "${{ steps.q.outputs.crm_status }}" \
            "${{ steps.q.outputs.onboarding_count }}" "${{ steps.q.outputs.retention_count }}" "${{ steps.q.outputs.new_count }}" \
            "${{ steps.q.outputs.ref_visits }}" "${{ steps.q.outputs.ref_bookings }}")

          gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label "growth-automation"
