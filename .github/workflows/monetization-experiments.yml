name: Monetization Experiments

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      experiment_id:
        description: "Experiment id (default pricing_packaging_v1)"
        required: false
        default: "pricing_packaging_v1"

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  experiment-guard:
    name: Pricing/Packaging Experiment Guard
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create experiment-alert --color 7c3aed --description "Experiment guardrail alert" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create experiment-stopped --color b60205 --description "Experiment auto-stopped" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Analyze A/B monetization experiment
        id: exp
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          EXP_ID="${{ github.event.inputs.experiment_id }}"
          if [ -z "$EXP_ID" ]; then EXP_ID="pricing_packaging_v1"; fi
          SINCE_7=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          TODAY=$(date -u +"%Y-%m-%d")

          ROWS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/operational_events?select=event_type,metadata,created_at&created_at=gte.${SINCE_7}&limit=50000" || echo "[]")

          EXP_ROWS=$(echo "$ROWS" | jq --arg e "$EXP_ID" '[.[] | select((.metadata.experiment_id // "") == $e)]')

          A_START=$(echo "$EXP_ROWS" | jq '[.[] | select(.event_type=="booking_submit_started" and ((.metadata.variant // "") == "A"))] | length')
          A_OK=$(echo "$EXP_ROWS" | jq '[.[] | select(.event_type=="booking_submit_success" and ((.metadata.variant // "") == "A"))] | length')
          A_FAIL=$(echo "$EXP_ROWS" | jq '[.[] | select(.event_type=="booking_submit_failed" and ((.metadata.variant // "") == "A"))] | length')

          B_START=$(echo "$EXP_ROWS" | jq '[.[] | select(.event_type=="booking_submit_started" and ((.metadata.variant // "") == "B"))] | length')
          B_OK=$(echo "$EXP_ROWS" | jq '[.[] | select(.event_type=="booking_submit_success" and ((.metadata.variant // "") == "B"))] | length')
          B_FAIL=$(echo "$EXP_ROWS" | jq '[.[] | select(.event_type=="booking_submit_failed" and ((.metadata.variant // "") == "B"))] | length')

          A_CONV=$(awk -v ok="$A_OK" -v tot="$A_START" 'BEGIN{if(tot==0) print "0.0"; else printf "%.1f", (ok*100)/tot}')
          B_CONV=$(awk -v ok="$B_OK" -v tot="$B_START" 'BEGIN{if(tot==0) print "0.0"; else printf "%.1f", (ok*100)/tot}')
          A_ERR=$(awk -v fail="$A_FAIL" -v tot="$A_START" 'BEGIN{if(tot==0) print "0.0"; else printf "%.1f", (fail*100)/tot}')
          B_ERR=$(awk -v fail="$B_FAIL" -v tot="$B_START" 'BEGIN{if(tot==0) print "0.0"; else printf "%.1f", (fail*100)/tot}')

          DELTA=$(awk -v a="$A_CONV" -v b="$B_CONV" 'BEGIN{printf "%.1f", b-a}')

          STATUS="running"
          WINNER="none"
          RECOMMENDATION="insufficient_data"
          REASON=""

          if [ "$A_START" -ge 30 ] && [ "$B_START" -ge 30 ]; then
            if awk -v d="$DELTA" 'BEGIN{exit (d<=-5)?0:1}'; then
              STATUS="stopped"
              WINNER="A"
              RECOMMENDATION="no-go_B_auto_stop"
              REASON="Variant B conversion is >5pp below control"
            elif awk -v d="$DELTA" 'BEGIN{exit (d>=3)?0:1}'; then
              STATUS="running"
              WINNER="B"
              RECOMMENDATION="candidate_go_B"
              REASON="Variant B outperforms control by >=3pp"
            else
              STATUS="running"
              WINNER="none"
              RECOMMENDATION="continue_test"
              REASON="Difference not significant"
            fi
          fi

          if awk -v e="$B_ERR" 'BEGIN{exit (e>10)?0:1}'; then
            STATUS="stopped"
            RECOMMENDATION="no-go_B_error_guardrail"
            REASON="Variant B error rate above 10%"
          fi

          echo "exp_id=$EXP_ID" >> "$GITHUB_OUTPUT"
          echo "a_start=$A_START" >> "$GITHUB_OUTPUT"
          echo "a_ok=$A_OK" >> "$GITHUB_OUTPUT"
          echo "a_conv=$A_CONV" >> "$GITHUB_OUTPUT"
          echo "a_err=$A_ERR" >> "$GITHUB_OUTPUT"
          echo "b_start=$B_START" >> "$GITHUB_OUTPUT"
          echo "b_ok=$B_OK" >> "$GITHUB_OUTPUT"
          echo "b_conv=$B_CONV" >> "$GITHUB_OUTPUT"
          echo "b_err=$B_ERR" >> "$GITHUB_OUTPUT"
          echo "delta=$DELTA" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "winner=$WINNER" >> "$GITHUB_OUTPUT"
          echo "recommendation=$RECOMMENDATION" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          printf "## Monetization Experiment (%s)\n\n" "${{ steps.exp.outputs.exp_id }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Status: %s\n" "${{ steps.exp.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Winner: %s\n" "${{ steps.exp.outputs.winner }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Recommendation: %s\n\n" "${{ steps.exp.outputs.recommendation }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Variant A: starts=%s success=%s conversion=%s%% error=%s%%\n" "${{ steps.exp.outputs.a_start }}" "${{ steps.exp.outputs.a_ok }}" "${{ steps.exp.outputs.a_conv }}" "${{ steps.exp.outputs.a_err }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Variant B: starts=%s success=%s conversion=%s%% error=%s%%\n" "${{ steps.exp.outputs.b_start }}" "${{ steps.exp.outputs.b_ok }}" "${{ steps.exp.outputs.b_conv }}" "${{ steps.exp.outputs.b_err }}" >> "$GITHUB_STEP_SUMMARY"
          printf "Delta B-A conversion: %spp\n" "${{ steps.exp.outputs.delta }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Open experiment issue on stop
        if: steps.exp.outputs.status == 'stopped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[EXPERIMENT-STOPPED] ${{ steps.exp.outputs.exp_id }} - ${{ steps.exp.outputs.today }}"
          EXISTS=$(gh issue list --repo "${{ github.repository }}" --state open --label experiment-stopped --json title -q ".[].title" | grep -F "$TITLE" | head -1)
          if [ -n "$EXISTS" ]; then exit 0; fi

          BODY=$(printf "Experiment auto-stop triggered.\n\nExperiment: %s\nReason: %s\nStatus: %s\nRecommendation: %s\n\nMetrics:\n- Variant A conversion: %s%% (error %s%%)\n- Variant B conversion: %s%% (error %s%%)\n- Delta B-A: %spp\n\nAction: pause rollout to B and keep A as control.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ steps.exp.outputs.exp_id }}" "${{ steps.exp.outputs.reason }}" "${{ steps.exp.outputs.status }}" "${{ steps.exp.outputs.recommendation }}" \
            "${{ steps.exp.outputs.a_conv }}" "${{ steps.exp.outputs.a_err }}" "${{ steps.exp.outputs.b_conv }}" "${{ steps.exp.outputs.b_err }}" "${{ steps.exp.outputs.delta }}")

          gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label "experiment-alert,experiment-stopped,incident"
