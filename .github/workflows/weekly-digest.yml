name: Weekly Executive Digest

# Runs every Monday at 07:00 UTC.
# Queries operational_events for the last 7 days via Supabase REST API.
# Creates a GitHub Issue with uptime/SLO/latency summary — no manual work required.

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    name: Generate Weekly Digest
    runs-on: ubuntu-latest
    steps:
      - name: Ensure weekly-digest label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "weekly-digest" --color "5319e7" \
            --description "Weekly executive digest" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Query operational metrics (last 7 days)
        id: metrics
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          WEEK_START=$(date -u -d "7 days ago" +"%Y-%m-%dT00:00:00Z")
          WEEK_LABEL_FROM=$(date -u -d "7 days ago" +"%b %d")
          WEEK_LABEL_TO=$(date -u +"%b %d, %Y")
          echo "week_label=$WEEK_LABEL_FROM – $WEEK_LABEL_TO" >> $GITHUB_OUTPUT

          fetch_flow() {
            local FLOW="$1"
            curl -sf \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              "$SUPABASE_URL/rest/v1/operational_events?select=outcome,latency_ms&flow=eq.${FLOW}&created_at=gte.${WEEK_START}" \
              2>/dev/null || echo "[]"
          }

          BOOKING_DATA=$(fetch_flow "booking")
          AUTH_DATA=$(fetch_flow "auth")
          API_DATA=$(fetch_flow "api")
          SYNTHETIC_DATA=$(curl -sf \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/operational_events?select=outcome,latency_ms,event_type&event_type=like.synthetic_*&created_at=gte.${WEEK_START}" \
            2>/dev/null || echo "[]")

          # All latencies for p95
          ALL_LAT=$(curl -sf \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/operational_events?select=latency_ms&created_at=gte.${WEEK_START}&latency_ms=not.is.null" \
            2>/dev/null || echo "[]")

          compute() {
            python3 << PYEOF
import json, sys
data = json.loads('''$1''')
total = len(data)
success = sum(1 for x in data if x.get('outcome') == 'success')
rate = f"{success/total*100:.1f}" if total > 0 else "N/A"
print(f"{total},{success},{rate}")
PYEOF
          }

          BOOKING_CSV=$(compute "$BOOKING_DATA")
          AUTH_CSV=$(compute "$AUTH_DATA")
          API_CSV=$(compute "$API_DATA")

          B_TOTAL=$(echo "$BOOKING_CSV" | cut -d, -f1)
          B_SUCCESS=$(echo "$BOOKING_CSV" | cut -d, -f2)
          B_RATE=$(echo "$BOOKING_CSV" | cut -d, -f3)

          A_TOTAL=$(echo "$AUTH_CSV" | cut -d, -f1)
          A_SUCCESS=$(echo "$AUTH_CSV" | cut -d, -f2)
          A_RATE=$(echo "$AUTH_CSV" | cut -d, -f3)

          API_TOTAL=$(echo "$API_CSV" | cut -d, -f1)
          API_SUCCESS=$(echo "$API_CSV" | cut -d, -f2)
          API_RATE=$(echo "$API_CSV" | cut -d, -f3)

          SYNTH_FAILURES=$(echo "$SYNTHETIC_DATA" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(sum(1 for x in d if x.get('outcome') == 'failure'))
" 2>/dev/null || echo "0")

          P95=$(echo "$ALL_LAT" | python3 -c "
import sys, json
d = json.load(sys.stdin)
vals = sorted([x['latency_ms'] for x in d if x.get('latency_ms') is not None])
if vals:
    idx = min(int(len(vals) * 0.95), len(vals) - 1)
    print(vals[idx])
else:
    print('N/A')
" 2>/dev/null || echo "N/A")

          status_icon() {
            python3 -c "
t, s, good, warn = $1, $2, $3, $4
if t == 0: print('⚪ No data')
elif s/t*100 >= good: print('✅ Good')
elif s/t*100 >= warn: print('⚠️ Warning')
else: print('🔴 Critical')
" 2>/dev/null || echo "⚪"
          }

          B_STATUS=$(status_icon "$B_TOTAL" "$B_SUCCESS" "99" "97")
          A_STATUS=$(status_icon "$A_TOTAL" "$A_SUCCESS" "99" "97")

          P95_STATUS=$(python3 -c "
p = '$P95'
try:
    v = int(p)
    if v <= 800: print('✅ Good (≤800ms)')
    elif v <= 1500: print('⚠️ Warning (≤1500ms)')
    else: print('🔴 Critical (>1500ms)')
except: print('⚪ No data')
" 2>/dev/null || echo "⚪")

          SYNTH_STATUS=$([ "$SYNTH_FAILURES" = "0" ] && echo "✅ Clean" || echo "⚠️ $SYNTH_FAILURES failure(s)")

          echo "b_rate=$B_RATE" >> $GITHUB_OUTPUT
          echo "b_total=$B_TOTAL" >> $GITHUB_OUTPUT
          echo "b_status=$B_STATUS" >> $GITHUB_OUTPUT
          echo "a_rate=$A_RATE" >> $GITHUB_OUTPUT
          echo "a_total=$A_TOTAL" >> $GITHUB_OUTPUT
          echo "a_status=$A_STATUS" >> $GITHUB_OUTPUT
          echo "api_rate=$API_RATE" >> $GITHUB_OUTPUT
          echo "api_total=$API_TOTAL" >> $GITHUB_OUTPUT
          echo "p95=$P95" >> $GITHUB_OUTPUT
          echo "p95_status=$P95_STATUS" >> $GITHUB_OUTPUT
          echo "synth_failures=$SYNTH_FAILURES" >> $GITHUB_OUTPUT
          echo "synth_status=$SYNTH_STATUS" >> $GITHUB_OUTPUT

      - name: Open/close incident count
        id: incidents
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")

          TOTAL=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state all \
            --label "incident" \
            --json createdAt \
            --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" \
            2>/dev/null || echo "0")

          OPEN=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "incident" \
            --json createdAt \
            --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" \
            2>/dev/null || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "open=$OPEN" >> $GITHUB_OUTPUT
          echo "Incidents this week: total=$TOTAL open=$OPEN"

      - name: Create digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK="${{ steps.metrics.outputs.week_label }}"
          B_RATE="${{ steps.metrics.outputs.b_rate }}"
          B_TOTAL="${{ steps.metrics.outputs.b_total }}"
          B_STATUS="${{ steps.metrics.outputs.b_status }}"
          A_RATE="${{ steps.metrics.outputs.a_rate }}"
          A_TOTAL="${{ steps.metrics.outputs.a_total }}"
          A_STATUS="${{ steps.metrics.outputs.a_status }}"
          API_RATE="${{ steps.metrics.outputs.api_rate }}"
          API_TOTAL="${{ steps.metrics.outputs.api_total }}"
          P95="${{ steps.metrics.outputs.p95 }}"
          P95_STATUS="${{ steps.metrics.outputs.p95_status }}"
          SYNTH_FAILURES="${{ steps.metrics.outputs.synth_failures }}"
          SYNTH_STATUS="${{ steps.metrics.outputs.synth_status }}"
          INC_TOTAL="${{ steps.incidents.outputs.total }}"
          INC_OPEN="${{ steps.incidents.outputs.open }}"

          # Determine overall health
          if echo "$B_STATUS$A_STATUS$P95_STATUS" | grep -q "🔴"; then
            OVERALL="🔴 DEGRADED — review critical metrics"
          elif echo "$B_STATUS$A_STATUS$P95_STATUS" | grep -q "⚠️"; then
            OVERALL="⚠️ WARNING — some metrics need attention"
          elif echo "$B_STATUS$A_STATUS" | grep -q "⚪"; then
            OVERALL="⚪ INSUFFICIENT DATA — monitoring pipeline may need attention"
          else
            OVERALL="✅ HEALTHY — all SLOs within targets"
          fi

          BODY="## 📊 Weekly Executive Digest — ${WEEK}

> Auto-generated every Monday · Review and close when read.

### Overall Status: ${OVERALL}

---

### SLO Dashboard

| Metric | Rate | Samples | Status |
|--------|------|---------|--------|
| 📦 Booking success | **${B_RATE}%** | ${B_TOTAL} | ${B_STATUS} |
| 🔐 Login success | **${A_RATE}%** | ${A_TOTAL} | ${A_STATUS} |
| ⚡ p95 API latency | **${P95}ms** | — | ${P95_STATUS} |
| 🔭 Synthetic failures | **${SYNTH_FAILURES}** | — | ${SYNTH_STATUS} |

### Incidents (last 7 days)

| Total | Open | Resolved |
|-------|------|----------|
| ${INC_TOTAL} | ${INC_OPEN} | $((INC_TOTAL - INC_OPEN)) |

[View all incidents](https://github.com/${{ github.repository }}/issues?q=label%3Aincident+sort%3Acreated-desc)

---

### SLO Targets Reference

| Signal | Good | Warning | Critical |
|--------|------|---------|----------|
| Booking success | ≥99% | ≥97% | <97% |
| Login success | ≥99% | ≥97% | <97% |
| p95 latency | ≤800ms | ≤1500ms | >1500ms |

### Next Best Action
$(
  if [ "${INC_OPEN}" != "0" ]; then
    echo "⚠️ **${INC_OPEN} open incident(s)** need resolution — check [incident list](https://github.com/${{ github.repository }}/issues?q=is%3Aopen+label%3Aincident)."
  elif echo "${B_STATUS}${A_STATUS}" | grep -q "🔴\|⚠️"; then
    echo "📈 Investigate SLO degradation — check [operational_events](https://supabase.com/dashboard/project/tffwoljimpdckvlogyqu/editor) for failure patterns."
  elif echo "${B_TOTAL}${A_TOTAL}" | grep -q "^0"; then
    echo "🔧 Monitoring pipeline has no data — verify \`operational_events\` inserts are working via \`/api/jobs/synthetic-monitor\`."
  else
    echo "✅ No action required — maintain current monitoring cadence."
  fi
)

---

### Quick Links
- [Vercel Deployments](https://vercel.com/anadailyana4-progs-projects/ocupaloc)
- [Supabase Dashboard](https://supabase.com/dashboard/project/tffwoljimpdckvlogyqu)
- [GitHub Actions](https://github.com/${{ github.repository }}/actions)

---
*Generated by [weekly-digest workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/weekly-digest.yml) · Every Monday 07:00 UTC*"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "📊 Weekly Digest — ${WEEK}" \
            --body "$BODY" \
            --label "weekly-digest"
