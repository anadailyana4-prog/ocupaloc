name: Data Safety Check

on:
  schedule:
    - cron: "0 8 * * 3"
  workflow_dispatch:

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup-check:
    name: Data Safety and Recovery Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Ensure data-safety label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create data-safety --color 0075ca --description "Data safety and restore readiness" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Check operational_events availability
        id: db
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SINCE=$(date -u -d "24 hours ago" +"%Y-%m-%dT%H:%M:%SZ")
          RESP=$(curl -s -w "\nHTTP:%{http_code}" -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" "$SUPABASE_URL/rest/v1/operational_events?select=id&created_at=gte.${SINCE}&limit=5" 2>/dev/null || echo "[]\nHTTP:000")

          HTTP=$(echo "$RESP" | awk -F: '/HTTP:/{print $2}')
          BODY=$(echo "$RESP" | sed '/HTTP:/d')
          COUNT=$(echo "$BODY" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)

          echo "http=$HTTP" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$HTTP" != "200" ]; then
            echo "table_ok=false" >> "$GITHUB_OUTPUT"
            echo "::error::operational_events unreachable (HTTP $HTTP)."
          else
            echo "table_ok=true" >> "$GITHUB_OUTPUT"
            if [ "$COUNT" = "0" ]; then
              echo "::warning::No operational events in the last 24h."
            fi
          fi

      - name: Check detailed health endpoint
        id: health
        run: |
          RESP=$(curl -s -w "\nHTTP:%{http_code}" --max-time 15 "https://ocupaloc.ro/api/health/detailed" 2>/dev/null || echo "{}\nHTTP:000")
          HTTP=$(echo "$RESP" | awk -F: '/HTTP:/{print $2}')
          BODY=$(echo "$RESP" | sed '/HTTP:/d')
          DB_OK=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('checks',{}).get('db','unknown'))" 2>/dev/null || echo unknown)

          echo "http=$HTTP" >> "$GITHUB_OUTPUT"
          echo "db_ok=$DB_OK" >> "$GITHUB_OUTPUT"

      - name: Biweekly restore-drill reminder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAY=$(date -u +%d | sed 's/^0//')
          WEEK=$(( (DAY - 1) / 7 + 1 ))
          if [ "$WEEK" != "1" ] && [ "$WEEK" != "3" ]; then
            echo "Not drill week; skipping reminder issue."
            exit 0
          fi

          TODAY=$(date -u +"%Y-%m-%d")
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --label data-safety --search "Backup Drill Reminder in:title" --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "$EXISTING" != "0" ]; then
            echo "Backup reminder already open; skipping."
            exit 0
          fi

          BODY=$(printf "Backup and restore drill reminder (%s)\n\nCurrent preconditions:\n- operational_events reachable: %s (HTTP %s)\n- recent events (24h): %s\n- health DB check: %s (HTTP %s)\n\nRequired actions:\n1. Verify latest Supabase backup timestamp.\n2. Confirm restore owner and ETA.\n3. Run lightweight restore drill and comment result.\n\nDrill template:\nnpx supabase db dump --db-url 'postgresql://postgres.tffwoljimpdckvlogyqu:<password>@aws-0-eu-west-1.pooler.supabase.com:5432/postgres' > backup_$(date +%%Y%%m%%d).sql\ngrep 'operational_events' backup_$(date +%%Y%%m%%d).sql\n" "$TODAY" "${{ steps.db.outputs.table_ok }}" "${{ steps.db.outputs.http }}" "${{ steps.db.outputs.count }}" "${{ steps.health.outputs.db_ok }}" "${{ steps.health.outputs.http }}")

          gh issue create --repo "${{ github.repository }}" --title "Backup Drill Reminder - $TODAY" --body "$BODY" --label data-safety

      - name: Enforce hard failure on DB unreachable
        if: steps.db.outputs.table_ok == 'false'
        run: |
          echo "::error::Data safety gate failed: operational_events is unreachable."
          exit 1
