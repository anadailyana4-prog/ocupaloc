name: Auto-Triage Incidents

# Triggered whenever Synthetic Monitor or Release Guard workflow fails.
# Creates a GitHub Issue with severity classification (P0–P3),
# impact description, runbook, and deduplication (one issue per workflow per day).

on:
  workflow_run:
    workflows: ["Synthetic Monitor", "Release Guard"]
    types: [completed]
  workflow_dispatch:
    inputs:
      test_severity:
        description: "Simulate severity (P0/P1/P2/P3) — test mode only"
        required: false
        default: ""

permissions:
  issues: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  triage:
    name: Classify & Create Incident Issue
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Ensure incident labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A LABELS=(
            ["incident"]="e11d48:Operational incident"
            ["auto-triage"]="0075ca:Created by auto-triage"
            ["P0"]="b60205:CRITICAL — site down"
            ["P1"]="d93f0b:HIGH — revenue impact"
            ["P2"]="e4e669:MEDIUM — auth degraded"
            ["P3"]="0e8a16:LOW — non-critical"
          )
          for name in "${!LABELS[@]}"; do
            color=$(echo "${LABELS[$name]}" | cut -d: -f1)
            desc=$(echo "${LABELS[$name]}" | cut -d: -f2)
            gh label create "$name" --color "$color" --description "$desc" \
              --repo "${{ github.repository }}" 2>/dev/null || true
          done
          echo "Labels ensured."

      - name: Collect failure context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          if [ -z "$WORKFLOW_NAME" ]; then
            WORKFLOW_NAME="Manual Triage Test"
          fi
          RUN_ID="${{ github.event.workflow_run.id }}"
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "0" ]; then
            RUN_ID="${{ github.run_id }}"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          DATE_TODAY=$(date -u +"%Y-%m-%d")

          echo "workflow_name=$WORKFLOW_NAME" >> $GITHUB_OUTPUT
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "date_today=$DATE_TODAY" >> $GITHUB_OUTPUT

          FAILED_JOBS=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")' \
            2>/dev/null || echo "unknown")
          echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
          echo "Failed jobs: $FAILED_JOBS"

      - name: Classify severity
        id: sev
        run: |
          JOBS_LOWER=$(echo "${{ steps.ctx.outputs.failed_jobs }}" | tr '[:upper:]' '[:lower:]')
          WORKFLOW_LOWER=$(echo "${{ steps.ctx.outputs.workflow_name }}" | tr '[:upper:]' '[:lower:]')
          TEST="${{ github.event.inputs.test_severity }}"

          if [ -n "$TEST" ]; then
            SEVERITY="$TEST"
          elif echo "$JOBS_LOWER" | grep -qE "health|availability|site"; then
            SEVERITY="P0"
          elif echo "$JOBS_LOWER$WORKFLOW_LOWER" | grep -qE "booking|canary|release.guard"; then
            SEVERITY="P1"
          elif echo "$JOBS_LOWER" | grep -qE "login|auth|dashboard|guard|redirect"; then
            SEVERITY="P2"
          else
            SEVERITY="P3"
          fi

          case "$SEVERITY" in
            P0) IMPACT="🔴 Site DOWN — all users affected. Immediate action required."
                SLA="Response: 15 min | Resolve: 1h" ;;
            P1) IMPACT="🟠 Booking flow or release gate FAILED — revenue impact possible."
                SLA="Response: 30 min | Resolve: 4h" ;;
            P2) IMPACT="🟡 Auth/login degraded — users may not access dashboard."
                SLA="Response: 2h | Resolve: 8h" ;;
            P3) IMPACT="🟢 Non-critical check failed — UX or monitoring degraded."
                SLA="Response: next business day" ;;
          esac

          echo "severity=$SEVERITY" >> $GITHUB_OUTPUT
          echo "impact=$IMPACT" >> $GITHUB_OUTPUT
          echo "sla=$SLA" >> $GITHUB_OUTPUT

      - name: Check for open duplicate (deduplication)
        id: dedupe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="${{ steps.ctx.outputs.date_today }}"
          WORKFLOW="${{ steps.ctx.outputs.workflow_name }}"
          SEVERITY="${{ steps.sev.outputs.severity }}"
          PREFIX="[$SEVERITY] $WORKFLOW"

          # Count open issues with this prefix created today
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "incident,auto-triage" \
            --json title,createdAt \
            --jq "[.[] | select(.title | startswith(\"$PREFIX\")) | select(.createdAt | startswith(\"$TODAY\"))] | length" \
            2>/dev/null || echo "0")

          echo "count=$EXISTING" >> $GITHUB_OUTPUT
          echo "Existing open issues today for '$PREFIX': $EXISTING"

      - name: Create incident issue
        if: steps.dedupe.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEV="${{ steps.sev.outputs.severity }}"
          WORKFLOW="${{ steps.ctx.outputs.workflow_name }}"
          RUN_URL="${{ steps.ctx.outputs.run_url }}"
          IMPACT="${{ steps.sev.outputs.impact }}"
          SLA="${{ steps.sev.outputs.sla }}"
          FAILED="${{ steps.ctx.outputs.failed_jobs }}"
          TS="${{ steps.ctx.outputs.timestamp }}"

          case "$SEV" in
            P0) ACTIONS="**Immediate steps:**
1. Verify production: \`curl -s https://ocupaloc.ro/api/health | python3 -m json.tool\`
2. Check Vercel status: https://vercel.com/anadailyana4-progs-projects/ocupaloc
3. Check Cloudflare DNS: https://dash.cloudflare.com
4. Rollback if needed:
   \`\`\`bash
   npx vercel ls --prod
   npx vercel alias set <last-healthy-url> ocupaloc.ro
   curl -s https://ocupaloc.ro/api/health | python3 -m json.tool
   \`\`\`" ;;
            P1) ACTIONS="**Investigation steps:**
1. Test booking flow: https://ocupaloc.ro/ana-nails
2. Check SLO snapshot: \`curl -s -H 'Authorization: Bearer \$SLO_READ_SECRET' https://ocupaloc.ro/api/ops/slo\`
3. Check Supabase DB: https://supabase.com/dashboard/project/tffwoljimpdckvlogyqu
4. If deploy caused regression: \`npx vercel alias set <prev-url> ocupaloc.ro\`" ;;
            P2) ACTIONS="**Investigation steps:**
1. Test login page: https://ocupaloc.ro/login
2. Verify redirect: \`curl -s -o /dev/null -w '%{redirect_url}' https://ocupaloc.ro/dashboard\`
3. Check Supabase Auth: https://supabase.com/dashboard/project/tffwoljimpdckvlogyqu/auth/users
4. Check middleware logs in Vercel: https://vercel.com/anadailyana4-progs-projects/ocupaloc/logs" ;;
            P3) ACTIONS="1. Review workflow logs: $RUN_URL
2. Monitor next 2 cycles for recurrence before escalating." ;;
          esac

          BODY="## 🚨 Incident — ${SEV}

| Field | Value |
|-------|-------|
| **Severity** | \`${SEV}\` |
| **Detected** | ${TS} |
| **SLA** | ${SLA} |
| **Source** | [${WORKFLOW}](${RUN_URL}) |

### Impact
${IMPACT}

### Failed Checks
\`\`\`
${FAILED}
\`\`\`

### Recommended Actions
${ACTIONS}

### Runbook (copy-paste validated commands)
\`\`\`bash
# 1. Health check
curl -s https://ocupaloc.ro/api/health | python3 -m json.tool

# 2. SLO snapshot (last 60 min)
curl -s -H 'Authorization: Bearer \$SLO_READ_SECRET' \\
  'https://ocupaloc.ro/api/ops/slo?windowMinutes=60'

# 3. Manual synthetic monitor run
curl -s -H 'Authorization: Bearer \$SYNTHETIC_MONITOR_SECRET' \\
  'https://ocupaloc.ro/api/jobs/synthetic-monitor'

# 4. Last 10 events in Supabase SQL Editor:
# SELECT event_type, flow, outcome, status_code, latency_ms, created_at
# FROM operational_events ORDER BY created_at DESC LIMIT 10;
\`\`\`

---
*Auto-generated by [auto-triage workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/auto-triage.yml) · Close when resolved.*"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[${SEV}] ${WORKFLOW} failure — ${TS}" \
            --body "$BODY" \
            --label "incident,auto-triage,${SEV}"

      - name: Duplicate suppressed
        if: steps.dedupe.outputs.count != '0'
        run: |
          echo "✓ Duplicate suppressed — open issue for [${{ steps.sev.outputs.severity }}] ${{ steps.ctx.outputs.workflow_name }} already exists today. No new issue created."
