name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce pnpm-only lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json detected. This repo uses pnpm only."
            exit 1
          fi

      - name: Test
        run: pnpm run test:ci

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint . --ignore-pattern next-env.d.ts

      - name: Audit dependencies
        run: pnpm audit --audit-level critical

      - name: Build
        run: pnpm exec next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://ocupaloc.ro

      - name: Install Playwright browser (E2E only)
        if: ${{ vars.ENABLE_E2E == 'true' }}
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E Smoke (optional on staging)
        if: ${{ vars.ENABLE_E2E == 'true' }}
        env:
          PLAYWRIGHT_REQUIRE_EXECUTION: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_BOOKING_SLUG: ${{ vars.PLAYWRIGHT_BOOKING_SLUG }}
          PLAYWRIGHT_ENABLE_DEMO_SMOKE: ${{ vars.PLAYWRIGHT_ENABLE_DEMO_SMOKE }}
        run: pnpm run test:e2e

