name: Weekly Executive Digest

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    name: Generate Weekly Digest
    runs-on: ubuntu-latest
    steps:
      - name: Ensure weekly-digest label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create weekly-digest --color 5319e7 --description "Weekly executive digest" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Collect operational metrics (7d)
        id: metrics
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          WEEK_START=$(date -u -d "7 days ago" +"%Y-%m-%dT00:00:00Z")
          WEEK_LABEL_FROM=$(date -u -d "7 days ago" +"%b %d")
          WEEK_LABEL_TO=$(date -u +"%b %d, %Y")

          Q_START=$(echo "$WEEK_START" | sed -e 's/:/%3A/g')

          ROWS=$(curl -sf -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" "$SUPABASE_URL/rest/v1/operational_events?select=flow,outcome,latency_ms,event_type,created_at&created_at=gte.$Q_START" || echo "[]")

          B_TOTAL=$(echo "$ROWS" | jq '[.[] | select(.flow=="booking")] | length')
          B_OK=$(echo "$ROWS" | jq '[.[] | select(.flow=="booking" and .outcome=="success")] | length')
          A_TOTAL=$(echo "$ROWS" | jq '[.[] | select(.flow=="auth")] | length')
          A_OK=$(echo "$ROWS" | jq '[.[] | select(.flow=="auth" and .outcome=="success")] | length')
          API_TOTAL=$(echo "$ROWS" | jq '[.[] | select(.flow=="api")] | length')
          API_OK=$(echo "$ROWS" | jq '[.[] | select(.flow=="api" and .outcome=="success")] | length')

          B_RATE=$(awk -v ok="$B_OK" -v tot="$B_TOTAL" 'BEGIN{if(tot==0) print "N/A"; else printf "%.1f", (ok*100)/tot}')
          A_RATE=$(awk -v ok="$A_OK" -v tot="$A_TOTAL" 'BEGIN{if(tot==0) print "N/A"; else printf "%.1f", (ok*100)/tot}')
          API_RATE=$(awk -v ok="$API_OK" -v tot="$API_TOTAL" 'BEGIN{if(tot==0) print "N/A"; else printf "%.1f", (ok*100)/tot}')

          P95=$(echo "$ROWS" | jq -r '[.[].latency_ms | select(type=="number")] | sort | if length==0 then "N/A" else .[((length*0.95)|floor)] end')
          SYNTH_FAIL=$(echo "$ROWS" | jq '[.[] | select((.event_type|tostring|startswith("synthetic_")) and .outcome=="failure")] | length')

          RISK1="No critical risks detected"
          RISK2="Maintain synthetic monitoring cadence"
          RISK3="Review open incidents weekly"

          if [ "$B_RATE" != "N/A" ] && awk -v v="$B_RATE" 'BEGIN{exit (v<97)?0:1}'; then RISK1="Booking success below warning threshold"; fi
          if [ "$A_RATE" != "N/A" ] && awk -v v="$A_RATE" 'BEGIN{exit (v<97)?0:1}'; then RISK2="Login success below warning threshold"; fi
          if [ "$P95" != "N/A" ] && [ "$P95" -gt 1500 ]; then RISK3="p95 latency above critical threshold"; fi

          if [ "$SYNTH_FAIL" -gt 0 ]; then NEXT_ACTION="Investigate synthetic failures first"; else NEXT_ACTION="Maintain current automation cadence"; fi

          {
            echo "week_label=$WEEK_LABEL_FROM - $WEEK_LABEL_TO"
            echo "booking_rate=$B_RATE"
            echo "booking_total=$B_TOTAL"
            echo "login_rate=$A_RATE"
            echo "login_total=$A_TOTAL"
            echo "api_rate=$API_RATE"
            echo "api_total=$API_TOTAL"
            echo "p95=$P95"
            echo "synth_failures=$SYNTH_FAIL"
            echo "risk1=$RISK1"
            echo "risk2=$RISK2"
            echo "risk3=$RISK3"
            echo "next_action=$NEXT_ACTION"
          } >> "$GITHUB_OUTPUT"

      - name: Count incidents opened this week
        id: incidents
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          TOTAL=$(gh issue list --repo "${{ github.repository }}" --state all --label incident --json createdAt --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" 2>/dev/null || echo 0)
          OPEN=$(gh issue list --repo "${{ github.repository }}" --state open --label incident --json createdAt --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" 2>/dev/null || echo 0)
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "open=$OPEN" >> "$GITHUB_OUTPUT"

      - name: Create digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(printf "Weekly digest period: %s\n\nUptime/incidents:\n- incidents opened: %s\n- incidents open: %s\n- synthetic failures: %s\n\nTrends:\n- booking success: %s%% (samples %s)\n- login success: %s%% (samples %s)\n- API success: %s%% (samples %s)\n- p95 latency: %s ms\n\nTop 3 risks:\n1) %s\n2) %s\n3) %s\n\nNext best action:\n%s\n" "${{ steps.metrics.outputs.week_label }}" "${{ steps.incidents.outputs.total }}" "${{ steps.incidents.outputs.open }}" "${{ steps.metrics.outputs.synth_failures }}" "${{ steps.metrics.outputs.booking_rate }}" "${{ steps.metrics.outputs.booking_total }}" "${{ steps.metrics.outputs.login_rate }}" "${{ steps.metrics.outputs.login_total }}" "${{ steps.metrics.outputs.api_rate }}" "${{ steps.metrics.outputs.api_total }}" "${{ steps.metrics.outputs.p95 }}" "${{ steps.metrics.outputs.risk1 }}" "${{ steps.metrics.outputs.risk2 }}" "${{ steps.metrics.outputs.risk3 }}" "${{ steps.metrics.outputs.next_action }}")

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Weekly Digest - ${{ steps.metrics.outputs.week_label }}" \
            --body "$BODY" \
            --label weekly-digest
