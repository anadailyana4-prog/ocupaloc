name: Support Copilot Internal

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  support-copilot:
    name: Generate Support Draft and Runbook
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'incident') ||
      contains(github.event.issue.labels.*.name, 'auto-triage') ||
      contains(github.event.issue.labels.*.name, 'kpi-alert') ||
      contains(github.event.issue.labels.*.name, 'data-quality') ||
      contains(github.event.issue.labels.*.name, 'rollout-block') ||
      contains(github.event.issue.labels.*.name, 'chaos-lite') ||
      contains(github.event.issue.labels.*.name, 'load-test') ||
      contains(github.event.issue.labels.*.name, 'cost-alert')
    steps:
      - name: Resolve issue number
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUM="${{ github.event.inputs.issue_number }}"
          else
            NUM="${{ github.event.issue.number }}"
          fi

          ISSUE_DATA=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$NUM" \
            || echo '{}')

          TITLE=$(echo "$ISSUE_DATA" | jq -r '.title // "Unknown"')
          BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""' | head -c 2000)
          LABELS=$(echo "$ISSUE_DATA" | jq -r '[.labels[].name] | join(",")' || echo "")
          STATE=$(echo "$ISSUE_DATA" | jq -r '.state // "open"')

          echo "number=$NUM"    >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"   >> "$GITHUB_OUTPUT"
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          echo "state=$STATE"   >> "$GITHUB_OUTPUT"

          # Write body to file to avoid env var length limits
          echo "$BODY" > /tmp/issue_body.txt

      - name: Classify severity
        id: classify
        run: |
          TITLE="${{ steps.issue.outputs.title }}"
          LABELS="${{ steps.issue.outputs.labels }}"
          BODY=$(cat /tmp/issue_body.txt)

          SEV="P3"
          SEV_REASON="Default classification - no critical signals detected"

          # P0: site-down or full booking failure
          if echo "$TITLE $BODY" | grep -qiE "down|unavailable|outage|500|503|crash"; then
            SEV="P0"
            SEV_REASON="Keywords suggest complete service unavailability"
          # P1: conversion drop or critical KPI alert
          elif echo "$LABELS $TITLE" | grep -qiE "kpi-alert|P1|CRITICAL|rollout-block|drill-fail"; then
            SEV="P1"
            SEV_REASON="Critical KPI or rollout block detected"
          # P1: booking failure rate or data corruption
          elif echo "$TITLE $BODY" | grep -qiE "booking.*fail|data.*corrupt|duplicate|invalid.*status"; then
            SEV="P1"
            SEV_REASON="Booking failure or data integrity issue"
          # P2: performance degradation or warning
          elif echo "$LABELS $TITLE" | grep -qiE "P2|kpi-warn|load-test|chaos-lite|WARN"; then
            SEV="P2"
            SEV_REASON="Performance degradation or warning threshold breach"
          # P3: cost, data quality info, weekly digest
          elif echo "$LABELS $TITLE" | grep -qiE "cost-alert|data-quality|weekly-digest|dq-anomaly"; then
            SEV="P3"
            SEV_REASON="Non-urgent operational issue"
          fi

          echo "severity=$SEV"       >> "$GITHUB_OUTPUT"
          echo "sev_reason=$SEV_REASON" >> "$GITHUB_OUTPUT"

      - name: Build runbook draft
        id: runbook
        run: |
          TITLE="${{ steps.issue.outputs.title }}"
          LABELS="${{ steps.issue.outputs.labels }}"
          SEV="${{ steps.classify.outputs.severity }}"
          BODY=$(cat /tmp/issue_body.txt)
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          NUM="${{ steps.issue.outputs.number }}"

          # Select runbook template based on signal type
          RUNBOOK_STEPS=""

          if echo "$LABELS $TITLE" | grep -qiE "synthetic|down|unavailable|outage"; then
            RUNBOOK_STEPS=$(printf "1. Check https://ocupaloc.ro/api/health - confirm current HTTP status\n2. Check Vercel dashboard for active incidents: https://vercel.com/dashboard\n3. Check Supabase status: https://status.supabase.com\n4. Review recent deployments on main branch - consider rollback if deploy < 2h ago\n5. Check Cloudflare for DDoS or routing issues\n6. Notify stakeholders if outage confirmed (ETA update every 15 min)")
          elif echo "$LABELS $TITLE" | grep -qiE "kpi-alert|conversion|booking.*fail"; then
            RUNBOOK_STEPS=$(printf "1. Check booking flow end-to-end on production (manual test)\n2. Review Vercel function logs for /api/book errors in last 2 hours\n3. Check Supabase operational_events for failure patterns: SELECT outcome, count(*) FROM operational_events WHERE created_at > NOW() - INTERVAL '2 hours' GROUP BY outcome;\n4. Verify Supabase connection pool is not exhausted\n5. Check for recent config/env var changes\n6. If conversion drop > 20%%: trigger rollback\n7. Monitor recovery with business-kpi-alert workflow")
          elif echo "$LABELS $TITLE" | grep -qiE "rollout-block|ab-guardrail|regression"; then
            RUNBOOK_STEPS=$(printf "1. Identify the specific commit that caused regression (check workflow run logs)\n2. Compare metrics before/after deploy: query operational_events with time filter\n3. If regression confirmed: run git revert HEAD on main and force-push\n4. Verify revert restores baseline metrics within 30 min\n5. Root cause analysis: which feature/change caused regression\n6. Add regression test before re-introducing change")
          elif echo "$LABELS $TITLE" | grep -qiE "data-quality|dq-anomaly|duplicate|invalid"; then
            RUNBOOK_STEPS=$(printf "1. Run investigation queries from issue body in Supabase SQL editor\n2. Identify root cause: client double-submit, race condition, or server bug\n3. For duplicates: check booking form submit handler for debouncing\n4. For invalid status: grep codebase for operational_events insert calls\n5. Clean up invalid/duplicate records with admin SQL after approval\n6. Add data validation test to prevent recurrence")
          elif echo "$LABELS $TITLE" | grep -qiE "load-test|soak|latency|p95|p99"; then
            RUNBOOK_STEPS=$(printf "1. Identify bottleneck endpoint from load test output (see workflow run)\n2. Profile slow endpoints with Vercel Analytics and Supabase slow query log\n3. Check for N+1 queries in booking flow\n4. Review Supabase indexes on operational_events and bookings tables\n5. Enable Next.js ISR for cacheable pages\n6. If p95 > 3000ms: block next release until optimized")
          elif echo "$LABELS $TITLE" | grep -qiE "cost-alert|cost.*spike"; then
            RUNBOOK_STEPS=$(printf "1. Check Vercel analytics for unusual traffic spike or function invocation surge\n2. Review Supabase usage in dashboard (DB size, connections, egress)\n3. Check for infinite loop or runaway cron in recent deploys\n4. Review CI/CD pipeline for unnecessary run triggers\n5. Implement archival for operational_events older than 90 days\n6. Set up Vercel spend alerts if not already configured")
          elif echo "$LABELS $TITLE" | grep -qiE "chaos-lite|drill"; then
            RUNBOOK_STEPS=$(printf "1. Review specific FAIL items in chaos drill (see workflow run)\n2. For 500 on invalid payload: add input validation middleware to /api routes\n3. For unauthenticated access: verify Supabase RLS policies and Next.js auth guards\n4. For slow health endpoint: check DB connection pool and query plan\n5. Schedule fix before next production deployment\n6. Rerun chaos drill after fix to confirm resolution")
          else
            RUNBOOK_STEPS=$(printf "1. Review issue details and identify affected component\n2. Check recent workflow runs for correlated failures\n3. Inspect Vercel and Supabase dashboards for anomalies\n4. Review last 5 commits on main for potential cause\n5. Escalate to P1 if user impact is confirmed")
          fi

          echo "runbook_steps<<RUNBOOK_EOF" >> "$GITHUB_OUTPUT"
          echo "$RUNBOOK_STEPS" >> "$GITHUB_OUTPUT"
          echo "RUNBOOK_EOF" >> "$GITHUB_OUTPUT"

      - name: Post support copilot comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM="${{ steps.issue.outputs.number }}"
          SEV="${{ steps.classify.outputs.severity }}"
          SEV_REASON="${{ steps.classify.outputs.sev_reason }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUNBOOK="${{ steps.runbook.outputs.runbook_steps }}"

          SEV_EMOJI="info"
          if [ "$SEV" = "P0" ]; then SEV_EMOJI="fire P0 - SITE DOWN";
          elif [ "$SEV" = "P1" ]; then SEV_EMOJI="P1 - Critical";
          elif [ "$SEV" = "P2" ]; then SEV_EMOJI="P2 - Warning";
          else SEV_EMOJI="P3 - Low"; fi

          COMMENT=$(printf "## Support Copilot Draft - %s\n\n**Severity:** %s\n**Classification reason:** %s\n\n### Runbook\n\n%s\n\n### SLO Targets\n\nP0: acknowledge <5 min, resolve <30 min\nP1: acknowledge <15 min, resolve <2 h\nP2: acknowledge <1 h, resolve <24 h\nP3: acknowledge <24 h, no strict SLO\n\n### Useful Links\n\n- Vercel dashboard: https://vercel.com/dashboard\n- Supabase dashboard: https://app.supabase.com\n- Production health: https://ocupaloc.ro/api/health/detailed\n- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n---\n_Auto-generated by Support Copilot workflow. Owner must review and act._" \
            "$DATE" "$SEV_EMOJI" "$SEV_REASON" "$RUNBOOK")

          gh issue comment "$NUM" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT"

      - name: Add severity label to issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM="${{ steps.issue.outputs.number }}"
          SEV="${{ steps.classify.outputs.severity }}"

          # Ensure severity label exists
          gh label create "$SEV" --color d93f0b --description "Severity $SEV" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          # Add severity label if not already present
          EXISTING="${{ steps.issue.outputs.labels }}"
          if ! echo "$EXISTING" | grep -q "$SEV"; then
            gh issue edit "$NUM" --repo "${{ github.repository }}" --add-label "$SEV" || true
          fi
