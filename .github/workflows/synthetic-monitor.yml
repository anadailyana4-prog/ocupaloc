name: Synthetic Monitor

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL (default: https://ocupaloc.ro)"
        required: false
        default: "https://ocupaloc.ro"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TARGET_URL: ${{ github.event.inputs.base_url || 'https://ocupaloc.ro' }}

jobs:
  health-check:
    name: Health & Availability Check
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        id: health
        run: |
          echo "Checking https://ocupaloc.ro/api/health ..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" --max-time 15 "https://ocupaloc.ro/api/health")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          echo "body=$BODY" >> "$GITHUB_OUTPUT"
          echo "HTTP $HTTP_STATUS"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Health check returned HTTP $HTTP_STATUS — app may be degraded."
            exit 1
          fi
          DB_OK=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('checks',{}).get('db', False))" 2>/dev/null || echo "false")
          if [ "$DB_OK" != "True" ]; then
            echo "::warning::Database check FAILED in health response."
          fi
          echo "✅ Health check OK (HTTP $HTTP_STATUS)"

      - name: Ping public booking page
        id: booking_page
        run: |
          echo "Checking public booking page load..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://ocupaloc.ro/ana-nails")
          echo "HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Public booking page returned HTTP $HTTP_STATUS."
            exit 1
          fi
          echo "✅ Public booking page OK"

      - name: Ping /s/ slug redirect
        id: slug_redirect
        run: |
          echo "Checking /s/ana-nails redirect..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 "https://ocupaloc.ro/s/ana-nails")
          echo "HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Slug redirect returned HTTP $HTTP_STATUS."
          fi
          echo "✅ Slug redirect OK"

      - name: Check booking API reachability (OPTIONS/HEAD)
        run: |
          echo "Checking /api/book endpoint reachability..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST -H "Content-Type: application/json" -d '{}' \
            "https://ocupaloc.ro/api/book")
          echo "HTTP $HTTP_STATUS"
          # 400 (bad body) = API is reachable and responding. 5xx = problem.
          if echo "$HTTP_STATUS" | grep -qE "^5[0-9]{2}$"; then
            echo "::error::/api/book returned HTTP $HTTP_STATUS — server error."
            exit 1
          fi
          echo "✅ /api/book reachable (HTTP $HTTP_STATUS)"

      - name: Check /dashboard → /login redirect
        run: |
          echo "Checking unauthenticated /dashboard redirects to /login..."
          LOCATION=$(curl -s -o /dev/null -w "%{redirect_url}" --max-time 10 "https://ocupaloc.ro/dashboard")
          echo "Redirect location: $LOCATION"
          if ! echo "$LOCATION" | grep -q "login"; then
            echo "::warning::/dashboard did not redirect to /login — auth guard may be broken."
          else
            echo "✅ Dashboard → Login redirect OK"
          fi

      - name: Report failure via alert webhook
        if: failure() && env.ALERT_WEBHOOK_URL != ''
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_BEARER_TOKEN: ${{ secrets.ALERT_WEBHOOK_BEARER_TOKEN }}
        run: |
          PAYLOAD=$(cat <<JSON
          {
            "level": "critical",
            "flow": "synthetic-monitor",
            "event": "health_check_failed",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
          )
          AUTH_HEADER=""
          if [ -n "$ALERT_WEBHOOK_BEARER_TOKEN" ]; then
            AUTH_HEADER="-H \"Authorization: Bearer $ALERT_WEBHOOK_BEARER_TOKEN\""
          fi
          curl -s -X POST -H "Content-Type: application/json" \
            ${AUTH_HEADER:+"$AUTH_HEADER"} \
            -d "$PAYLOAD" "$ALERT_WEBHOOK_URL" || true
          echo "Alert dispatched."
